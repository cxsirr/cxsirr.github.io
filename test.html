<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cxsir</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden;position:relative}
.bg-container{position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat;transform:scale(1.1);z-index:-2}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.15);z-index:-1;pointer-events:none}
.container{display:flex;flex-direction:column;align-items:center;padding:20px;z-index:1;position:relative;min-height:100vh;justify-content:center;gap:18px}
.profile{text-align:center;width:100%;max-width:420px;backdrop-filter:blur(5px);background:rgba(20,40,80,.25);padding:36px 28px 28px;border-radius:24px;border:1px solid rgba(20,40,80,.12);box-shadow:0 8px 32px rgba(0,0,0,.35);animation:fadeIn .6s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pfp-wrap{display:flex;justify-content:center;margin-bottom:18px}
.pfp{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid rgba(20,40,80,.25);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.profile h1{font-size:2em;margin-bottom:8px;letter-spacing:.5px}
.profile .tagline{font-size:1.05em;color:#cfcfcf;margin-bottom:22px;line-height:1.5}
.social-links{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:22px auto 4px auto;max-width:340px}
.social-link{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(20,40,80,.08);border:2px solid rgba(20,40,80,.15);border-radius:50%;transition:all .25s ease;text-decoration:none;overflow:hidden;color:#fff}
.social-link svg{width:22px;height:22px;fill:currentColor;color:inherit;transition:all .25s ease;display:block}
.social-link:hover{background:rgba(20,40,80,.18);border-color:rgba(20,40,80,.5);transform:translateY(-4px);box-shadow:0 5px 15px rgba(0,0,0,.25)}
.social-link:active{transform:translateY(-2px) scale(.97)}
.music-player{margin-top:22px;padding:10px;display:flex;flex-direction:column;gap:10px;background:rgba(20,40,80,.55);border:1px solid rgba(20,40,80,.1);border-radius:14px;position:relative;transition:background .6s ease,border-color .6s ease}
.music-top-row{display:flex;align-items:center;gap:12px;width:100%}
.music-art{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(20,40,80,.08)}
.music-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.music-title{font-size:.85em;font-weight:600;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.music-artist{font-size:.72em;color:#a8a8a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;margin-top:-2px}
.music-scrub-row{display:flex;align-items:center;gap:8px;width:100%}
.music-time{font-size:.7em;color:#a0a0a0;flex-shrink:0;flex-grow:0;width:32px}
.music-time.current{text-align:right}
.music-time.duration{text-align:left}
.music-scrubber{flex:1 1 auto;min-width:0;max-width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(40,80,160,.5);cursor:pointer;outline:none}
.music-scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.music-scrubber::-moz-range-thumb{width:10px;height:10px;border:none;border-radius:50%;background:#fff;cursor:pointer}
.music-controls{display:flex;align-items:center;gap:2px;flex-shrink:0}
.music-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:#e0e0e0;cursor:pointer;border-radius:50%;transition:background .2s ease}
.music-btn:hover{background:rgba(20,40,80,.12)}
.music-btn svg{width:16px;height:16px;fill:currentColor}
.music-btn.play-pause svg{width:18px;height:18px}
.music-btn:disabled{opacity:.3;cursor:default}
.music-btn:disabled:hover{background:none}
.spotify-badge,.recently-played-badge{position:absolute;top:-8px;right:10px;background:rgba(20,40,80,.5);color:#cfe0ff;font-size:.6em;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.3px;border:1px solid rgba(207,224,255,.4);display:none}
.rl-section{width:100%;max-width:420px}
.rl-card{backdrop-filter:blur(5px);padding:24px 22px;animation:fadeIn .6s ease-in}
.rl-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.rl-platform-icon{width:28px;height:28px;flex-shrink:0;fill:#e0e0e0}
.rl-header h2{font-size:1.3em;font-weight:700}
.rl-header .rl-username{font-size:.85em;color:#a8b8d8;font-weight:400;text-align:left}
.rl-loading,.rl-error{font-size:.85em;color:#a8a8a8;text-align:center;padding:12px 0}
.rl-best-mmr{display:flex;justify-content:space-between;align-items:center;background:rgba(20,40,80,.4);border-radius:10px;padding:12px 16px;margin-bottom:16px}
.rl-best-mmr .label{font-size:.8em;color:#a8b8d8}
.rl-best-mmr .value{font-size:1.3em;font-weight:700;color:#fff}
.rl-playlists{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.rl-playlist-card{background:rgba(20,40,80,.35);border-radius:10px;padding:12px 10px;text-align:center}
.rl-playlist-name{font-size:.7em;color:#a8b8d8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.rl-playlist-rank-img{width:48px;height:48px;margin:0 auto 6px;display:block;object-fit:contain}
.rl-playlist-rank-name{font-size:.78em;font-weight:600;color:#f0f0f0}
.rl-playlist-division{font-size:.85em;font-weight:400;color:#8a9bc0}
.rl-playlist-rating{font-size:.68em;color:#8a9bc0;margin-top:2px}
.rl-overview-title{font-size:.85em;font-weight:600;color:#cfcfcf;margin-bottom:10px}
.rl-overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rl-stat{background:rgba(20,40,80,.3);border-radius:8px;padding:10px 6px;text-align:center}
.rl-stat .value{font-size:1.1em;font-weight:700;color:#fff}
.rl-stat .label{font-size:.62em;color:#8a9bc0;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.rl-updated{font-size:.65em;color:#6f80a0;text-align:right;margin-top:14px}
@media (max-width:600px){
.profile{padding:28px 18px 22px}
.pfp{width:90px;height:90px}
.profile h1{font-size:1.7em}
.social-links{gap:8px;max-width:280px}
.social-link{width:40px;height:40px}
.social-link svg{width:19px;height:19px}
.rl-overview-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="bg-container" id="bgContainer"></div>
<div class="container">
<div class="profile" id="profileCard">
<div class="pfp-wrap"><img class="pfp" id="profilePfp" src="" alt="Profile picture"></div>
<h1 id="profileName"></h1>
<p class="tagline" id="profileBio"></p>
<div class="social-links" id="socialLinks"></div>
<div class="music-player" id="musicPlayer">
<div class="spotify-badge" id="spotifyBadge">Now Playing</div>
<div class="recently-played-badge" id="recentlyPlayedBadge">Recently Played</div>
<div class="music-top-row">
<img class="music-art" id="musicArt" src="" alt="" crossorigin="anonymous">
<div class="music-info">
<div class="music-title" id="musicTitle">No track loaded</div>
<div class="music-artist" id="musicArtist"></div>
</div>
<div class="music-controls" id="musicControls">
<button class="music-btn" id="musicPrev" title="Previous track"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
<button class="music-btn play-pause" id="musicPlayPause" title="Play/Pause"><svg id="playIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg><svg id="pauseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
<button class="music-btn" id="musicNext" title="Next track"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
</div>
</div>
<div class="music-scrub-row" id="musicScrubRow">
<span class="music-time current" id="musicCurrentTime">0:00</span>
<input type="range" class="music-scrubber" id="musicScrubber" value="0" min="0" max="100" step="0.1">
<span class="music-time duration" id="musicDuration">0:00</span>
</div>
<audio id="audioEl" preload="metadata"></audio>
<canvas id="artSampleCanvas" width="10" height="10" style="display:none"></canvas>
</div>
</div>
<div class="rl-section" id="rlSection">
<div class="profile rl-card" id="rlCard">
<div class="rl-header">
<svg class="rl-platform-icon" id="rlPlatformIcon" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"></svg>
<div><h2>Rocket League</h2><div class="rl-username" id="rlUsername"></div></div>
</div>
<div id="rlContent"><div class="rl-loading" id="rlLoading">Loading stats…</div></div>
<div class="rl-updated" id="rlUpdated"></div>
</div>
</div>
</div>
<script>
const NAME="cxsir",BIO="a lost cause",PFP="assets/pfp/cxsir.jpg",BG="assets/bg/cxsir.jpg",BG_BLUR=0;
const CARD_BORDER="rgba(20,40,80,.12)",CARD_BG="rgba(20,40,80,.25)";
const ICON_BORDER="rgba(20,40,80,.15)",ICON_BG="rgba(20,40,80,.08)";
const PLAYER_BORDER="rgba(20,40,80,.1)",PLAYER_BG="rgba(20,40,80,.55)",PLAYER_TINT_FROM_ART=true;
const SPOTIFY_URL="https://github-io.cxsir.workers.dev",SPOTIFY_POLL=10;
const TRACKS=[];
const RL_URL="https://github-io.cxsir.workers.dev/rocketleague",RL_ID="cxsir",RL_NAME="I cxsir I";
const LINKS=[
{name:"Snapchat",url:"https://snapchat.com/add/gangangcuh",icon:"snapchat"},
{name:"Instagram",url:"https://instagram.com/cxsirr",icon:"instagram"},
{name:"YouTube",url:"https://youtube.com/@cxsirr",icon:"youtube"},
{name:"Spotify",url:"https://open.spotify.com/user/dandandaman1234",icon:"spotify"},
{name:"Last.fm",url:"https://last.fm/user/cxsir",icon:"lastfm"},
{name:"PlayStation",url:"https://profile.playstation.com/IGOTTMT",icon:"playstation"},
{name:"Xbox",url:"https://xbox.com/play/user/cxsirr",icon:"xbox"},
{name:"Steam",url:"https://steamcommunity.com/id/cxsir",icon:"steam"},
{name:"Discord",url:"https://discord.com/users/803306255062007818",icon:"discord"},
{name:"Roblox",url:"https://roblox.com/users/2242266391/profile",icon:"roblox"},
{name:"GitHub",url:"https://github.com/cxsirr",icon:"github"},
{name:"Email",url:"mailto:cxsir@proton.me",icon:"email"}
];

function formatTime(s){if(!isFinite(s))return"0:00";const m=Math.floor(s/60),x=Math.floor(s%60).toString().padStart(2,'0');return`${m}:${x}`}

window.addEventListener('DOMContentLoaded',()=>{
document.getElementById('profileName').textContent=NAME;
document.getElementById('profileBio').textContent=BIO;
document.getElementById('profilePfp').src=PFP;
const bg=document.getElementById('bgContainer');
bg.style.backgroundImage=`url('${BG}')`;
bg.style.filter=`blur(${BG_BLUR}px)`;

const profileCard=document.getElementById('profileCard');
profileCard.style.borderColor=CARD_BORDER;
profileCard.style.background=CARD_BG;
const rlCard=document.getElementById('rlCard');
rlCard.style.borderColor=CARD_BORDER;
rlCard.style.background=CARD_BG;
const musicPlayerEl=document.getElementById('musicPlayer');
musicPlayerEl.style.borderColor=PLAYER_BORDER;
musicPlayerEl.style.background=PLAYER_BG;

const iconStyle=document.createElement('style');
iconStyle.textContent=`.social-link{border-color:${ICON_BORDER}!important;background:${ICON_BG}!important}`;
document.head.appendChild(iconStyle);

const linksContainer=document.getElementById('socialLinks');
LINKS.forEach(async link=>{
const a=document.createElement('a');
a.href=link.url;a.className='social-link';a.title=link.name;a.target='_blank';
try{
const res=await fetch(`assets/logos/${link.icon}.svg`);
const svgText=await res.text();
a.insertAdjacentHTML('beforeend',svgText);
const t=a.querySelector('svg title');
if(t)t.remove();
}catch(e){}
linksContainer.appendChild(a);
});

const audio=document.getElementById('audioEl');
const playPauseBtn=document.getElementById('musicPlayPause');
const playIcon=document.getElementById('playIcon');
const pauseIcon=document.getElementById('pauseIcon');
const prevBtn=document.getElementById('musicPrev');
const nextBtn=document.getElementById('musicNext');
const scrubber=document.getElementById('musicScrubber');
const currentTimeEl=document.getElementById('musicCurrentTime');
const durationEl=document.getElementById('musicDuration');
const scrubRow=document.getElementById('musicScrubRow');
const titleEl=document.getElementById('musicTitle');
const artistEl=document.getElementById('musicArtist');
const artEl=document.getElementById('musicArt');
const spotifyBadge=document.getElementById('spotifyBadge');
const recentlyPlayedBadge=document.getElementById('recentlyPlayedBadge');
const musicControlsEl=document.getElementById('musicControls');
const sampleCanvas=document.getElementById('artSampleCanvas');
const sampleCtx=sampleCanvas.getContext('2d',{willReadFrequently:true});

function tintPlayerFromArt(img){
if(!PLAYER_TINT_FROM_ART||!img||!img.src){resetPlayerTint();return}
const apply=()=>{
try{
sampleCtx.drawImage(img,0,0,10,10);
const{data}=sampleCtx.getImageData(0,0,10,10);
let r=0,g=0,b=0,c=0;
for(let i=0;i<data.length;i+=4){r+=data[i];g+=data[i+1];b+=data[i+2];c++}
r=Math.round(r/c);g=Math.round(g/c);b=Math.round(b/c);
musicPlayerEl.style.background=`linear-gradient(135deg,rgba(${r},${g},${b},.35),${PLAYER_BG})`;
musicPlayerEl.style.borderColor=`rgba(${r},${g},${b},.4)`;
}catch(e){resetPlayerTint()}
};
if(img.complete&&img.naturalWidth>0)apply();
else{img.onload=apply;img.onerror=resetPlayerTint}
}
function resetPlayerTint(){musicPlayerEl.style.background=PLAYER_BG;musicPlayerEl.style.borderColor=PLAYER_BORDER}

let trackIndex=0,isScrubbing=false,spotifyMode=false,lastSpotifyUrl=null,spotifyProgressMs=0,spotifyDurationMs=0,spotifyTickHandle=null;

function loadTrack(i,autoplay){
if(!TRACKS.length)return;
trackIndex=(i+TRACKS.length)%TRACKS.length;
renderTrack(TRACKS[trackIndex],autoplay);
}
function renderTrack(track,autoplay){
audio.src=track.url;
titleEl.textContent=track.title||"Untitled";
artistEl.textContent=track.artist||"";
artistEl.style.display=track.artist?'block':'none';
artEl.src=track.art||"";
artEl.style.visibility=track.art?'visible':'hidden';
tintPlayerFromArt(track.art?artEl:null);
scrubRow.style.display='flex';
if(autoplay)audio.play().catch(()=>{});
}
function setPlayingIcon(playing){
playIcon.style.display=playing?'none':'block';
pauseIcon.style.display=playing?'block':'none';
}
function setSpotifyMode(active){
spotifyMode=active;
prevBtn.disabled=active;nextBtn.disabled=active;playPauseBtn.disabled=active;scrubber.disabled=active;
musicControlsEl.style.display=active?'none':'flex';
if(!active){spotifyBadge.style.display='none';recentlyPlayedBadge.style.display='none'}
}
function startSpotifyTicking(){
stopSpotifyTicking();
spotifyTickHandle=setInterval(()=>{
if(!spotifyMode)return;
spotifyProgressMs=Math.min(spotifyProgressMs+1000,spotifyDurationMs||spotifyProgressMs+1000);
updateSpotifyProgressUI();
},1000);
}
function stopSpotifyTicking(){if(spotifyTickHandle){clearInterval(spotifyTickHandle);spotifyTickHandle=null}}
function updateSpotifyProgressUI(){
const p=spotifyProgressMs/1000,d=spotifyDurationMs/1000;
scrubber.max=d||0;scrubber.value=p;
currentTimeEl.textContent=formatTime(p);
durationEl.textContent=formatTime(d);
}
async function fetchNowPlaying(){
if(!SPOTIFY_URL)return;
try{
const res=await fetch(SPOTIFY_URL,{cache:'no-store'});
const data=await res.json();
if(!data||!data.title){
if(spotifyMode){setSpotifyMode(false);stopSpotifyTicking();loadTrack(0,false)}
return;
}
const isNewTrack=data.url!==lastSpotifyUrl;
lastSpotifyUrl=data.url;
spotifyProgressMs=typeof data.progressMs==="number"?data.progressMs:0;
spotifyDurationMs=typeof data.durationMs==="number"?data.durationMs:0;
setSpotifyMode(true);
spotifyBadge.style.display=data.isPlaying?'block':'none';
recentlyPlayedBadge.style.display=data.isPlaying?'none':'block';
scrubRow.style.display=data.isPlaying?'flex':'none';
if(isNewTrack){
renderTrack({title:data.title,artist:data.artist||"",art:data.art||"",url:""},false);
audio.pause();audio.removeAttribute('src');
setPlayingIcon(data.isPlaying);
scrubRow.style.display=data.isPlaying?'flex':'none';
titleEl.title=data.url?"Open in Spotify":"";
if(data.url){titleEl.style.cursor='pointer';titleEl.onclick=()=>window.open(data.url,'_blank')}
}else setPlayingIcon(data.isPlaying);
updateSpotifyProgressUI();
if(data.isPlaying)startSpotifyTicking();
else stopSpotifyTicking();
}catch(e){}
}
if(SPOTIFY_URL){fetchNowPlaying();setInterval(fetchNowPlaying,Math.max(5,SPOTIFY_POLL)*1000)}
else if(TRACKS.length)loadTrack(0,false);

playPauseBtn.addEventListener('click',()=>{
if(spotifyMode)return;
if(audio.paused)audio.play().catch(()=>{});
else audio.pause();
});
prevBtn.addEventListener('click',()=>{if(!spotifyMode)loadTrack(trackIndex-1,true)});
nextBtn.addEventListener('click',()=>{if(!spotifyMode)loadTrack(trackIndex+1,true)});
audio.addEventListener('play',()=>setPlayingIcon(true));
audio.addEventListener('pause',()=>setPlayingIcon(false));
audio.addEventListener('ended',()=>{if(!spotifyMode)loadTrack(trackIndex+1,true)});
audio.addEventListener('loadedmetadata',()=>{scrubber.max=audio.duration||0;durationEl.textContent=formatTime(audio.duration)});
audio.addEventListener('timeupdate',()=>{if(isScrubbing)return;scrubber.value=audio.currentTime;currentTimeEl.textContent=formatTime(audio.currentTime)});
scrubber.addEventListener('input',()=>{if(spotifyMode)return;isScrubbing=true;currentTimeEl.textContent=formatTime(parseFloat(scrubber.value))});
scrubber.addEventListener('change',()=>{if(spotifyMode)return;audio.currentTime=parseFloat(scrubber.value);isScrubbing=false});

document.getElementById('rlUsername').textContent=RL_NAME;
(async()=>{
try{
const res=await fetch('assets/logos/rocketleague.svg');
const svgText=await res.text();
const parsed=new DOMParser().parseFromString(svgText,'image/svg+xml');
const fetched=parsed.querySelector('svg');
const target=document.getElementById('rlPlatformIcon');
if(fetched&&target)target.innerHTML=fetched.innerHTML;
}catch(e){}
})();

function formatNumber(n){return typeof n==='number'?n.toLocaleString():n}
function getStatValue(stats,keys){
if(!stats)return null;
for(const k of keys){
const s=stats[k];
if(s&&typeof s.value==='number')return s.value;
if(typeof s==='number')return s;
}
return null;
}
function renderRocketLeagueStats(profile){
const content=document.getElementById('rlContent');
content.innerHTML='';
if(!profile){content.innerHTML='<div class="rl-error">No stats available yet.</div>';return}
const segments=profile.segments||[];
const overview=segments.find(s=>s.type==='overview')||null;
const WANTED=[
{api:'Ranked Duel 1v1',name:'Ranked 1v1'},
{api:'Ranked Doubles 2v2',name:'Ranked 2v2'},
{api:'Rumble',name:'Rumble'},
{api:'Tournament Matches',name:'Tournaments'},
{api:'Heatseeker',name:'Heatseeker'},
{api:'Casual',name:'Casual'}
];
const playlists=WANTED.map(w=>{
const seg=segments.find(s=>s.type==='playlist'&&s.metadata?.name===w.api);
return seg?{seg,name:w.name}:null;
}).filter(Boolean);
if(typeof profile.best_2v2_mmr==='number'){
const row=document.createElement('div');
row.className='rl-best-mmr';
row.innerHTML=`<span class="label">Best 2v2 MMR</span><span class="value">${formatNumber(profile.best_2v2_mmr)}</span>`;
content.appendChild(row);
}
if(playlists.length){
const grid=document.createElement('div');
grid.className='rl-playlists';
playlists.forEach(({seg,name})=>{
const rankName=seg.stats?.tier?.metadata?.name||'Unranked';
const rankImg=seg.stats?.tier?.metadata?.iconUrl||'';
const div=seg.stats?.division?.metadata?.name||'';
const rating=getStatValue(seg.stats,['rating']);
const card=document.createElement('div');
card.className='rl-playlist-card';
card.innerHTML=`<div class="rl-playlist-name">${name}</div>${rankImg?`<img class="rl-playlist-rank-img" src="${rankImg}" alt="${rankName}">`:''}<div class="rl-playlist-rank-name">${rankName}</div>${div?`<div class="rl-playlist-division">${div}</div>`:''}${rating!==null?`<div class="rl-playlist-rating">${formatNumber(rating)} MMR</div>`:''}`;
grid.appendChild(card);
});
content.appendChild(grid);
}
if(overview&&overview.stats){
const t=document.createElement('div');
t.className='rl-overview-title';
t.textContent='Lifetime Stats';
content.appendChild(t);
const defs=[{k:['wins'],l:'Wins'},{k:['goals'],l:'Goals'},{k:['assists'],l:'Assists'},{k:['saves'],l:'Saves'},{k:['shots'],l:'Shots'},{k:['mVPs'],l:'MVPs'}];
const grid=document.createElement('div');
grid.className='rl-overview-grid';
defs.forEach(d=>{
const val=getStatValue(overview.stats,d.k);
if(val===null)return;
const cell=document.createElement('div');
cell.className='rl-stat';
cell.innerHTML=`<div class="value">${formatNumber(val)}</div><div class="label">${d.l}</div>`;
grid.appendChild(cell);
});
if(grid.children.length)content.appendChild(grid);
else if(!content.children.length)content.innerHTML='<div class="rl-error">No stats available yet.</div>';
}
if(!content.children.length)content.innerHTML='<div class="rl-error">No stats available yet.</div>';
}
async function fetchRocketLeagueStats(){
if(!RL_URL)return;
try{
const res=await fetch(RL_URL,{cache:'no-store'});
const data=await res.json();
const entry=data[RL_ID];
const updatedEl=document.getElementById('rlUpdated');
if(!entry||!entry.profile){
document.getElementById('rlContent').innerHTML=`<div class="rl-loading">${entry?.error||'Stats not cached yet — check back soon.'}</div>`;
updatedEl.textContent='';
return;
}
renderRocketLeagueStats(entry.profile);
if(entry.lastUpdated){
const d=new Date(entry.lastUpdated);
updatedEl.textContent=`Updated ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}
}catch(e){
document.getElementById('rlContent').innerHTML='<div class="rl-error">Couldn\'t load stats right now.</div>';
}
}
fetchRocketLeagueStats();
});
</script>
</body>
</html>
