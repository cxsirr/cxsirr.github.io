<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRKT</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: #0f0f0f;
color: #e0e0e0;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}
/* Background Image - blur amount is set inline from CONFIG.bgBlur via JS */
.bg-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
transform: scale(1.1); /* avoids blurred edges showing at the viewport border */
z-index: -2;
}
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.45);
z-index: -1;
pointer-events: none;
}
/* Content Container */
.container {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
padding: 20px;
z-index: 1;
position: relative;
}
/* Profile Card - blur amount is now set inline from CONFIG.profileBlur via JS */
.profile {
text-align: center;
width: 100%;
max-width: 420px;
background: rgba(40, 40, 40, 0.55);
padding: 36px 28px 28px;
border-radius: 24px;
border: 1px solid rgba(255, 255, 255, 0.12);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
animation: fadeIn 0.6s ease-in;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
/* Profile Picture */
.pfp-wrap {
display: flex;
justify-content: center;
margin-bottom: 18px;
}
.pfp {
width: 110px;
height: 110px;
border-radius: 50%;
object-fit: cover;
border: 3px solid rgba(255, 255, 255, 0.25);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}
.profile h1 {
font-size: 2em;
margin-bottom: 8px;
letter-spacing: 0.5px;
}
.profile .tagline {
font-size: 1.05em;
color: #cfcfcf;
margin-bottom: 22px;
line-height: 1.5;
}
/* Clean grid layout for social icons */
.social-links {
display: flex;
justify-content: center;
gap: 12px;
flex-wrap: wrap;
margin: 22px auto 4px auto;
max-width: 340px;
}
.social-link {
width: 44px;
height: 44px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255, 255, 255, 0.08);
border: 2px solid rgba(255, 255, 255, 0.15);
border-radius: 50%;
transition: all 0.25s ease;
text-decoration: none;
overflow: hidden;
color: #ffffff;
}
/* Inline SVG icon styling - currentColor works since SVG markup lives in the DOM */
.social-link svg {
width: 22px;
height: 22px;
fill: currentColor;
color: inherit;
transition: all 0.25s ease;
display: block;
}
.social-link:hover {
background: rgba(255, 255, 255, 0.18);
border-color: rgba(255, 255, 255, 0.5);
transform: translateY(-4px);
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
}
.social-link:active {
transform: translateY(-2px) scale(0.97);
}
/* Center-aligned Showcase Container for Exophase Card */
.card-showcase {
display: flex;
justify-content: center;
align-items: center;
width: 100%;
margin: 18px 0 4px 0;
}
.showcase-card {
display: block;
width: 100%;
max-width: 360px;
transition: all 0.3s ease;
border-radius: 12px;
overflow: hidden;
border: 1px solid rgba(255, 255, 255, 0.12);
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
}
.showcase-card img {
width: 100%;
height: auto;
display: block;
object-fit: contain;
}
.showcase-card:hover {
transform: scale(1.03);
border-color: rgba(255, 255, 255, 0.3);
box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
}
/* Custom Music Player */
.music-player {
margin-top: 22px;
padding: 10px;
display: flex;
align-items: center;
gap: 12px;
background: rgba(20, 20, 20, 0.55);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 14px;
}
.music-art {
width: 46px;
height: 46px;
border-radius: 8px;
object-fit: cover;
flex-shrink: 0;
background: rgba(255, 255, 255, 0.08);
}
.music-info {
flex: 1;
min-width: 0;
display: flex;
flex-direction: column;
gap: 4px;
}
.music-title {
font-size: 0.85em;
font-weight: 600;
color: #f0f0f0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
}
.music-artist {
font-size: 0.72em;
color: #a8a8a8;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
margin-top: -2px;
}
.music-scrub-row {
display: flex;
align-items: center;
gap: 8px;
}
.music-time {
font-size: 0.7em;
color: #a0a0a0;
flex-shrink: 0;
min-width: 28px;
}
.music-time.current { text-align: right; }
.music
