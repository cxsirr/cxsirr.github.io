<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile</title>
  <style>
    :root{--bg1:#0f0f12;--bg2:#0b0b0b;--card:#111;--muted:#9aa0a6;--accent:#00d4ff}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#eaeef2;display:flex;align-items:center;justify-content:center;padding:24px}
    .container{max-width:880px;width:100%}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:28px;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
    .profile{display:flex;gap:20px;align-items:center}
    .avatar{width:92px;height:92px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#7b61ff);display:flex;align-items:center;justify-content:center;font-weight:700;color:#081118}
    h1{margin:0;font-size:1.6rem}
    p.bio{margin:8px 0 0;color:var(--muted)}
    .socials{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .social{display:inline-flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.02);text-decoration:none;color:inherit;border:1px solid rgba(255,255,255,0.03)}
    .social img{width:28px;height:28px;display:block}
    .social .label{font-size:.95rem;color:var(--muted)}
    @media(min-width:720px){.profile{align-items:flex-start}.avatar{width:112px;height:112px;border-radius:16px}}
  </style>
</head>
<body>
  <main class="container">
    <section class="card" aria-label="Profile">
      <div class="profile">
        <div class="avatar" id="avatar">CXS</div>
        <div>
          <h1 id="profileName">cx­sirr</h1>
          <p class="bio" id="profileBio">Developer • Curious about web, tooling and design</p>
          <div class="socials" id="socials" aria-label="Social links"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Clean, deterministic loader for social icons and links.
    // Edit the CONFIG below to add/remove networks. The order here will be preserved.
    const CONFIG = {
      name: 'cxsirr',
      bio: 'Developer • Curious about web, tooling and design',
      socials: [
        { name: 'Discord', url: 'https://discord.com/users/803306255062007818', logo: 'discord.svg' },
        { name: 'Instagram', url: 'https://instagram.com/cxsirr', logo: 'instagram.svg' },
        { name: 'YouTube', url: 'https://youtube.com/@cxsirr', logo: 'youtube.svg' },
        { name: 'Spotify', url: 'https://open.spotify.com/user/dandandaman1234', logo: 'spotify.svg' },
        { name: 'Last.fm', url: 'https://last.fm/user/cxsir', logo: 'lastfm.svg' },
        { name: 'PlayStation', url: 'https://profile.playstation.com/IGOTTM', logo: 'playstation.svg' },
        { name: 'Xbox', url: 'https://xbox.com/play/user/cxsirr', logo: 'xbox.svg' },
        { name: 'Steam', url: 'https://steamcommunity.com/id/cxsirr', logo: 'steam.svg' },
        { name: 'Roblox', url: 'https://roblox.com/users/2242266391/profile', logo: 'roblox.svg' },
        { name: 'ProtonMail', url: 'mailto:cxsirr@proton.me', logo: 'protonmail.svg' },
        { name: 'Email', url: 'mailto:cxsirr@proton.me', logo: 'email.svg' }
      ]
    };

    // Render profile text
    document.getElementById('profileName').textContent = CONFIG.name;
    document.getElementById('profileBio').textContent = CONFIG.bio;

    // Function to create a social anchor element
    function makeSocialLink(item){
      const a = document.createElement('a');
      a.className = 'social';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.setAttribute('aria-label', item.name);

      const img = document.createElement('img');
      // load from the new folder assets/logos2; fallback to assets/logos if file missing
      img.src = `assets/logos2/${item.logo}`;
      img.alt = item.name + ' logo';
      img.loading = 'lazy';

      const span = document.createElement('span');
      span.className = 'label';
      span.textContent = item.name;

      a.appendChild(img);
      a.appendChild(span);
      return a;
    }

    // Append socials in deterministic order
    (function renderSocials(){
      const container = document.getElementById('socials');
      CONFIG.socials.forEach(s => {
        try{
          container.appendChild(makeSocialLink(s));
        }catch(e){
          // Non-fatal: continue rendering other links
          console.error('social render error', e, s);
        }
      });
    })();
  </script>
</body>
</html>
