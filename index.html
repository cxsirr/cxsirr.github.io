<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cxsir</title>
<style>
/* ============================================================
   CONFIG — edit everything here. Colors/sizes are applied via
   JS at load time (see CONFIG object in the <script> below),
   so most visual tweaks only need changes in ONE place: the
   CONFIG object near the top of the script.
   ============================================================ */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: #0f0f0f;
color: #e0e0e0;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}
/* Background Image - blur amount is set inline from CONFIG.bgBlur via JS */
.bg-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
transform: scale(1.1); /* avoids blurred edges showing at the viewport border */
z-index: -2;
}
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.15);
z-index: -1;
pointer-events: none;
}
/* Content Container */
.container {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
padding: 20px;
z-index: 1;
position: relative;
}
/* Profile Card — border-color/width/radius set inline from CONFIG.card* via JS */
.profile {
text-align: center;
width: 100%;
max-width: 420px;
backdrop-filter: blur(5px);
background: rgba(40, 40, 40, 0.25);
padding: 36px 28px 28px;
border-radius: 24px;
border: 1px solid rgba(255, 255, 255, 0.12);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
animation: fadeIn 0.6s ease-in;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
/* Profile Picture */
.pfp-wrap {
display: flex;
justify-content: center;
margin-bottom: 18px;
}
.pfp {
width: 110px;
height: 110px;
border-radius: 50%;
object-fit: cover;
border: 3px solid rgba(20, 40, 80, 0.25);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}
.profile h1 {
font-size: 2em;
margin-bottom: 8px;
letter-spacing: 0.5px;
}
.profile .tagline {
font-size: 1.05em;
color: #cfcfcf;
margin-bottom: 22px;
line-height: 1.5;
}
/* Clean grid layout for social icons — border-color/width set inline from CONFIG.icon* via JS */
.social-links {
display: flex;
justify-content: center;
gap: 12px;
flex-wrap: wrap;
margin: 22px auto 4px auto;
max-width: 340px;
}
.social-link {
width: 44px;
height: 44px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255, 255, 255, 0.08);
border: 2px solid rgba(255, 255, 255, 0.15);
border-radius: 50%;
transition: all 0.25s ease;
text-decoration: none;
overflow: hidden;
color: #ffffff;
}
/* Inline SVG icon styling - currentColor works since SVG markup lives in the DOM */
.social-link svg {
width: 22px;
height: 22px;
fill: currentColor;
color: inherit;
transition: all 0.25s ease;
display: block;
}
.social-link:hover {
background: rgba(255, 255, 255, 0.18);
border-color: rgba(255, 255, 255, 0.5);
transform: translateY(-4px);
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
}
.social-link:active {
transform: translateY(-2px) scale(0.97);
}
/* Center-aligned Showcase Container for Exophase Card — border-color/width/radius
   set inline from CONFIG.showcase* via JS */
.card-showcase {
display: flex;
justify-content: center;
align-items: center;
width: 100%;
margin: 18px 0 4px 0;
}
.showcase-card {
display: block;
width: 100%;
max-width: 360px;
transition: all 0.3s ease;
border-radius: 12px;
overflow: hidden;
border: 1px solid rgba(255, 255, 255, 0.12);
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
}
.showcase-card img {
width: 100%;
height: auto;
display: block;
object-fit: contain;
}
.showcase-card:hover {
transform: scale(1.03);
border-color: rgba(255, 255, 255, 0.3);
box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
}
/* Custom Music Player — border-color/width/radius set inline from CONFIG.player* via JS */
.music-player {
margin-top: 22px;
padding: 10px;
display: flex;
align-items: center;
gap: 12px;
background: rgba(50, 50, 50, 0.55);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 14px;
position: relative;
transition: background 0.6s ease, border-color 0.6s ease;
}
.music-art {
width: 46px;
height: 46px;
border-radius: 8px;
object-fit: cover;
flex-shrink: 0;
background: rgba(255, 255, 255, 0.08);
}
.music-info {
flex: 1;
min-width: 0;
display: flex;
flex-direction: column;
gap: 4px;
}
.music-title {
font-size: 0.85em;
font-weight: 600;
color: #f0f0f0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
}
.music-artist {
font-size: 0.72em;
color: #a8a8a8;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
margin-top: -2px;
}
.music-scrub-row {
display: flex;
align-items: center;
gap: 8px;
}
.music-time {
font-size: 0.7em;
color: #a0a0a0;
flex-shrink: 0;
min-width: 28px;
}
.music-time.current { text-align: right; }
.music-time.duration { text-align: left; }
.music-scrubber {
flex: 1;
-webkit-appearance: none;
appearance: none;
height: 4px;
border-radius: 2px;
background: rgba(255, 255, 255, 0.2);
cursor: pointer;
outline: none;
}
.music-scrubber::-webkit-slider-thumb {
-webkit-appearance: none;
width: 10px;
height: 10px;
border-radius: 50%;
background: #ffffff;
cursor: pointer;
}
.music-scrubber::-moz-range-thumb {
width: 10px;
height: 10px;
border: none;
border-radius: 50%;
background: #ffffff;
cursor: pointer;
}
.music-controls {
display: flex;
align-items: center;
gap: 2px;
flex-shrink: 0;
}
.music-btn {
width: 30px;
height: 30px;
display: flex;
align-items: center;
justify-content: center;
background: none;
border: none;
color: #e0e0e0;
cursor: pointer;
border-radius: 50%;
transition: background 0.2s ease;
}
.music-btn:hover {
background: rgba(255, 255, 255, 0.12);
}
.music-btn svg {
width: 16px;
height: 16px;
fill: currentColor;
}
.music-btn.play-pause svg {
width: 18px;
height: 18px;
}
.music-btn:disabled {
opacity: 0.3;
cursor: default;
}
.music-btn:disabled:hover {
background: none;
}
/* Small "Live from Spotify" badge shown when CONFIG.spotifyWorkerUrl is active */
.spotify-badge {
position: absolute;
top: -8px;
right: 10px;
background: #1ed760;
color: #0f0f0f;
font-size: 0.6em;
font-weight: 700;
padding: 2px 7px;
border-radius: 8px;
letter-spacing: 0.3px;
display: none;
}
/* Responsive Mobile Layout Rules */
@media (max-width: 600px) {
.profile {
padding: 28px 18px 22px;
}
.pfp {
width: 90px;
height: 90px;
}
.profile h1 {
font-size: 1.7em;
}
.social-links {
gap: 8px;
max-width: 280px;
}
.social-link {
width: 40px;
height: 40px;
}
.social-link svg {
width: 19px;
height: 19px;
}
}
</style>
</head>
<body>
<div class="bg-container" id="bgContainer"></div>
<div class="container">
<div class="profile" id="profileCard">
<div class="pfp-wrap">
<img class="pfp" id="profilePfp" src="" alt="Profile picture">
</div>
<h1 id="profileName"></h1>
<p class="tagline" id="profileBio"></p>

<div class="social-links" id="socialLinks"></div>

<div class="music-player" id="musicPlayer">
<div class="spotify-badge" id="spotifyBadge">LIVE</div>
<img class="music-art" id="musicArt" src="" alt="" crossorigin="anonymous">
<div class="music-info">
<div class="music-title" id="musicTitle">No track loaded</div>
<div class="music-artist" id="musicArtist"></div>
<div class="music-scrub-row">
<span class="music-time current" id="musicCurrentTime">0:00</span>
<input type="range" class="music-scrubber" id="musicScrubber" value="0" min="0" max="100" step="0.1">
<span class="music-time duration" id="musicDuration">0:00</span>
</div>
</div>
<div class="music-controls">
<button class="music-btn" id="musicPrev" title="Previous track">
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
</button>
<button class="music-btn play-pause" id="musicPlayPause" title="Play/Pause">
<svg id="playIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
<svg id="pauseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
</button>
<button class="music-btn" id="musicNext" title="Next track">
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
</button>
</div>
<audio id="audioEl" preload="metadata"></audio>
<canvas id="artSampleCanvas" width="10" height="10" style="display:none"></canvas>
</div>

<div class="card-showcase" id="cardShowcase"></div>


</div>
</div>

<script>
/* ============================================================
   CONFIG — everything you'd want to tweak lives here, at the
   top of the file, on purpose. Profile info, background, every
   card's border (color/width/radius), music tracks, and links.
   ============================================================ */
const CONFIG = {
// ---- Profile ----
name: "cxsir",
bio: "lost",
pfpUrl: "assets/pfp/cxsir.jpg", // relative to this file (root/index.html)

// ---- Background ----
bgImage: "assets/bg/cxsir.jpg",
bgBlur: 0, // px of blur applied to the background image

// ---- Main profile card styling ----
cardBorderColor: "rgba(20, 40, 80, 0.25)",
cardBorderWidth: 12, // px
cardBorderRadius: 24, // px
cardBackground: "rgba(20, 40, 80, 0.25)",

// ---- Social icon circle styling ----
iconBorderColor: "rgba(20, 40, 80, 0.25)",
iconBorderWidth: 2, // px
iconBackground: "rgba(20, 40, 80, 0.1)",

// ---- Exophase showcase card styling ----
exophaseCardUrl: "https://card.exophase.com/2/0/327032.png",
showcaseBorderColor: "rgba(20, 40, 80, 0.25)",
showcaseBorderWidth: 2, // px
showcaseBorderRadius: 12, // px

// ---- Music player styling ----
playerBorderColor: "rgba(255, 255, 255, 0.1)",
playerBorderWidth: 2, // px
playerBorderRadius: 14, // px
playerBackground: "rgba(50, 50, 50, 0.25)",
// When true, album art color sampling overrides playerBackground/
// playerBorderColor dynamically per track (see tintPlayerFromArt below).
// Set to false to always keep the static colors above.
playerColorFromArt: true,

// ---- Spotify "now playing" integration ----
// Your deployed Cloudflare Worker URL. When set, the player auto-updates to
// whatever Spotify reports as currently/recently playing, polling every
// spotifyPollSeconds, with a real progress bar synced to actual playback
// position (ticks locally between polls, corrected on each poll).
// Leave as "" to disable and fall back to the manual tracks list below.
spotifyWorkerUrl: "https://cxsir-github-io-widget.tymchyshyndaniel4-171.workers.dev/",
spotifyPollSeconds: 10,

// ---- Fallback / manual playlist ----
// Used only if spotifyWorkerUrl is empty, or if a fetch to it fails.
// prev/next cycle through this list; scrubber/duration update from the
// loaded audio file itself.
tracks: [
{ title: "God of Basketball", artist: "", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", art: "" },
],

// ---- Social links ----
links: [
{ name: "Snapchat", url: "https://snapchat.com/add/gangangcuh", icon: "snapchat" },
{ name: "Instagram", url: "https://instagram.com/cxsirr", icon: "instagram" },
{ name: "YouTube", url: "https://youtube.com/@cxsirr", icon: "youtube" },
{ name: "Spotify", url: "https://open.spotify.com/user/dandandaman1234", icon: "spotify" },
{ name: "Last.fm", url: "https://last.fm/user/cxsir", icon: "lastfm" },
{ name: "PlayStation", url: "https://profile.playstation.com/IGOTTMT", icon: "playstation" },
{ name: "Xbox", url: "https://xbox.com/play/user/cxsirr", icon: "xbox" },
{ name: "Steam", url: "https://steamcommunity.com/id/cxsir", icon: "steam" },
{ name: "Discord", url: "https://discord.com/users/803306255062007818", icon: "discord" },
{ name: "Roblox", url: "https://roblox.com/users/2242266391/profile", icon: "roblox" },
{ name: "GitHub", url: "https://github.com/cxsirr", icon: "github" },
{ name: "Email", url: "mailto:cxsir@proton.me", icon: "email" }
]
};

function formatTime(seconds) {
if (!isFinite(seconds)) return "0:00";
const m = Math.floor(seconds / 60);
const s = Math.floor(seconds % 60).toString().padStart(2, '0');
return `${m}:${s}`;
}

window.addEventListener('DOMContentLoaded', () => {
document.getElementById('profileName').textContent = CONFIG.name;
document.getElementById('profileBio').textContent = CONFIG.bio;
document.getElementById('profilePfp').src = CONFIG.pfpUrl;

if (CONFIG.bgImage) {
const bg = document.getElementById('bgContainer');
bg.style.backgroundImage = `url('${CONFIG.bgImage}')`;
bg.style.filter = `blur(${CONFIG.bgBlur}px)`;
}

// ---- Apply CONFIG-driven border/background styling ----
const profileCard = document.getElementById('profileCard');
profileCard.style.borderColor = CONFIG.cardBorderColor;
profileCard.style.borderWidth = `${CONFIG.cardBorderWidth}px`;
profileCard.style.borderRadius = `${CONFIG.cardBorderRadius}px`;
profileCard.style.background = CONFIG.cardBackground;

const musicPlayerStatic = document.getElementById('musicPlayer');
musicPlayerStatic.style.borderColor = CONFIG.playerBorderColor;
musicPlayerStatic.style.borderWidth = `${CONFIG.playerBorderWidth}px`;
musicPlayerStatic.style.borderRadius = `${CONFIG.playerBorderRadius}px`;
musicPlayerStatic.style.background = CONFIG.playerBackground;

// Inject icon border/background as a small stylesheet, since these apply
// to every .social-link rather than one element by id.
const iconStyleTag = document.createElement('style');
iconStyleTag.textContent = `
.social-link {
border-color: ${CONFIG.iconBorderColor} !important;
border-width: ${CONFIG.iconBorderWidth}px !important;
background: ${CONFIG.iconBackground} !important;
}
`;
document.head.appendChild(iconStyleTag);

// ---- Social icons: fetch + inline each SVG so currentColor (white) applies ----
const linksContainer = document.getElementById('socialLinks');
CONFIG.links.forEach(async (link) => {
const a = document.createElement('a');
a.href = link.url;
a.className = 'social-link';
a.title = link.name;
a.target = '_blank';

if (link.icon) {
try {
const res = await fetch(`assets/logos/${link.icon}.svg`);
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const svgText = await res.text();
a.insertAdjacentHTML('beforeend', svgText);

const svgEl = a.querySelector('svg');
const titleEl = svgEl && svgEl.querySelector('title');
if (titleEl) titleEl.remove();
} catch (err) {
console.error(`Failed to load icon "${link.icon}":`, err);
}
}

linksContainer.appendChild(a);
});

if (CONFIG.exophaseCardUrl) {
const showcaseContainer = document.getElementById('cardShowcase');
const aCard = document.createElement('a');
aCard.href = "https://www.exophase.com/user/cxsir/";
aCard.className = 'showcase-card';
aCard.target = '_blank';
aCard.title = "Exophase Card";
aCard.style.borderColor = CONFIG.showcaseBorderColor;
aCard.style.borderWidth = `${CONFIG.showcaseBorderWidth}px`;
aCard.style.borderRadius = `${CONFIG.showcaseBorderRadius}px`;

const imgCard = document.createElement('img');
imgCard.src = CONFIG.exophaseCardUrl;
imgCard.alt = "Exophase Achievement Card";
aCard.appendChild(imgCard);

showcaseContainer.appendChild(aCard);
}

// ---- Custom music player ----
const audio = document.getElementById('audioEl');
const playPauseBtn = document.getElementById('musicPlayPause');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const prevBtn = document.getElementById('musicPrev');
const nextBtn = document.getElementById('musicNext');
const scrubber = document.getElementById('musicScrubber');
const currentTimeEl = document.getElementById('musicCurrentTime');
const durationEl = document.getElementById('musicDuration');
const titleEl = document.getElementById('musicTitle');
const artistEl = document.getElementById('musicArtist');
const artEl = document.getElementById('musicArt');
const spotifyBadge = document.getElementById('spotifyBadge');
const musicPlayerEl = document.querySelector('.music-player');
const sampleCanvas = document.getElementById('artSampleCanvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

// Samples the loaded album art image down to a tiny canvas and averages the
// pixels to get a rough dominant color, then tints the player's background
// and border with it. Falls back to CONFIG's static player colors on any
// error (e.g. cross-origin image without proper CORS headers) or if
// CONFIG.playerColorFromArt is disabled.
function tintPlayerFromArt(imgEl) {
if (!CONFIG.playerColorFromArt || !imgEl || !imgEl.src) {
resetPlayerTint();
return;
}

const apply = () => {
try {
sampleCtx.drawImage(imgEl, 0, 0, 10, 10);
const { data } = sampleCtx.getImageData(0, 0, 10, 10);
let r = 0, g = 0, b = 0, count = 0;
for (let i = 0; i < data.length; i += 4) {
r += data[i];
g += data[i + 1];
b += data[i + 2];
count++;
}
r = Math.round(r / count);
g = Math.round(g / count);
b = Math.round(b / count);

musicPlayerEl.style.background = `linear-gradient(135deg, rgba(${r}, ${g}, ${b}, 0.35), rgba(20, 20, 20, 0.55))`;
musicPlayerEl.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.4)`;
} catch (err) {
// Likely a CORS-tainted canvas (cross-origin image without proper headers).
// Logged so this is easy to spot in devtools rather than failing silently.
console.warn('Album art color sampling failed:', err);
resetPlayerTint();
}
};

if (imgEl.complete && imgEl.naturalWidth > 0) {
apply();
} else {
imgEl.onload = apply;
imgEl.onerror = resetPlayerTint;
}
}

function resetPlayerTint() {
musicPlayerEl.style.background = CONFIG.playerBackground;
musicPlayerEl.style.borderColor = CONFIG.playerBorderColor;
}

let trackIndex = 0;
let isScrubbing = false;
let spotifyMode = false; // true once a successful Spotify fetch has happened
let lastSpotifyUrl = null; // used to skip the expensive re-render when track hasn't changed
let spotifyProgressMs = 0; // last known progress from Spotify, advanced locally between polls
let spotifyDurationMs = 0;
let spotifyTickHandle = null; // setInterval handle for local progress ticking

function loadTrack(index, autoplay) {
if (!CONFIG.tracks.length) return;
trackIndex = (index + CONFIG.tracks.length) % CONFIG.tracks.length;
const track = CONFIG.tracks[trackIndex];
renderTrack(track, autoplay);
}

function renderTrack(track, autoplay) {
audio.src = track.url;
titleEl.textContent = track.title || "Untitled";
artistEl.textContent = track.artist || "";
artistEl.style.display = track.artist ? 'block' : 'none';
artEl.src = track.art || "";
artEl.style.visibility = track.art ? 'visible' : 'hidden';
tintPlayerFromArt(track.art ? artEl : null);
if (autoplay) audio.play().catch(() => {});
}

function setPlayingIcon(playing) {
playIcon.style.display = playing ? 'none' : 'block';
pauseIcon.style.display = playing ? 'block' : 'none';
}

function setSpotifyMode(active) {
spotifyMode = active;
// While in Spotify mode, prev/next/scrubber don't make sense (it's just a
// status display, not a playable local file), so disable them.
prevBtn.disabled = active;
nextBtn.disabled = active;
playPauseBtn.disabled = active;
scrubber.disabled = active;
if (!active) spotifyBadge.style.display = 'none';
}

// Advances the displayed progress bar by 1 second locally, between polls,
// so the bar moves smoothly instead of jumping only every spotifyPollSeconds.
// Gets corrected back to the real value on the next successful poll.
function startSpotifyTicking() {
stopSpotifyTicking();
spotifyTickHandle = setInterval(() => {
if (!spotifyMode) return;
spotifyProgressMs = Math.min(spotifyProgressMs + 1000, spotifyDurationMs || spotifyProgressMs + 1000);
updateSpotifyProgressUI();
}, 1000);
}

function stopSpotifyTicking() {
if (spotifyTickHandle) {
clearInterval(spotifyTickHandle);
spotifyTickHandle = null;
}
}

function updateSpotifyProgressUI() {
const progressSec = spotifyProgressMs / 1000;
const durationSec = spotifyDurationMs / 1000;
scrubber.max = durationSec || 0;
scrubber.value = progressSec;
currentTimeEl.textContent = formatTime(progressSec);
durationEl.textContent = formatTime(durationSec);
}

// ---- Spotify "now playing" polling ----
async function fetchNowPlaying() {
if (!CONFIG.spotifyWorkerUrl) return;

try {
const res = await fetch(CONFIG.spotifyWorkerUrl, { cache: 'no-store' });
if (!res.ok) throw new Error(`Worker returned ${res.status}`);
const data = await res.json();

if (!data || !data.title) {
// Nothing playing and no recent history either — fall back to manual list.
if (spotifyMode) {
setSpotifyMode(false);
stopSpotifyTicking();
loadTrack(0, false);
}
return;
}

const isNewTrack = data.url !== lastSpotifyUrl;
lastSpotifyUrl = data.url;

// Always refresh progress/duration, even if the track itself hasn't changed,
// so the bar stays accurate to the real playback position on every poll.
spotifyProgressMs = typeof data.progressMs === "number" ? data.progressMs : 0;
spotifyDurationMs = typeof data.durationMs === "number" ? data.durationMs : 0;

setSpotifyMode(true);
spotifyBadge.style.display = data.isPlaying ? 'block' : 'none';

if (isNewTrack) {
renderTrack({
title: data.title,
artist: data.artist || "",
art: data.art || "",
url: "" // no playable audio file from Spotify's API, this is status-only
}, false);

// There's no audio source to actually play (Spotify doesn't expose full
// track streaming via this API), so just clear/pause the local <audio>.
audio.pause();
audio.removeAttribute('src');
setPlayingIcon(data.isPlaying);

titleEl.title = data.url ? "Open in Spotify" : "";
if (data.url) {
titleEl.style.cursor = 'pointer';
titleEl.onclick = () => window.open(data.url, '_blank');
}
} else {
setPlayingIcon(data.isPlaying);
}

updateSpotifyProgressUI();

// Only tick locally while actually playing — paused tracks shouldn't
// advance the bar on their own between polls.
if (data.isPlaying) {
startSpotifyTicking();
} else {
stopSpotifyTicking();
}
} catch (err) {
console.error('Spotify fetch failed:', err);
// Leave whatever was last shown (manual track or last good Spotify data)
// rather than clearing the player on a transient network error.
}
}

if (CONFIG.spotifyWorkerUrl) {
fetchNowPlaying();
setInterval(fetchNowPlaying, Math.max(5, CONFIG.spotifyPollSeconds) * 1000);
} else if (CONFIG.tracks.length) {
loadTrack(0, false);
}

playPauseBtn.addEventListener('click', () => {
if (spotifyMode) return;
if (audio.paused) {
audio.play().catch(() => {});
} else {
audio.pause();
}
});

prevBtn.addEventListener('click', () => {
if (spotifyMode) return;
loadTrack(trackIndex - 1, true);
});
nextBtn.addEventListener('click', () => {
if (spotifyMode) return;
loadTrack(trackIndex + 1, true);
});

audio.addEventListener('play', () => setPlayingIcon(true));
audio.addEventListener('pause', () => setPlayingIcon(false));
audio.addEventListener('ended', () => {
if (!spotifyMode) loadTrack(trackIndex + 1, true);
});

audio.addEventListener('loadedmetadata', () => {
scrubber.max = audio.duration || 0;
durationEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('timeupdate', () => {
if (isScrubbing) return;
scrubber.value = audio.currentTime;
currentTimeEl.textContent = formatTime(audio.currentTime);
});

scrubber.addEventListener('input', () => {
if (spotifyMode) return;
isScrubbing = true;
currentTimeEl.textContent = formatTime(parseFloat(scrubber.value));
});

scrubber.addEventListener('change', () => {
if (spotifyMode) return;
audio.currentTime = parseFloat(scrubber.value);
isScrubbing = false;
});
});
</script>
</body>
</html>
