<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            z-index: -2;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }

        /* Content Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile p {
            font-size: 1.1em;
            color: #b0b0b0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Standard Social Links Grid - Fixed width constraints */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap; 
            margin: 25px auto 15px auto;
            max-width: 330px; /* Forces exactly 6 links per line */
        }

        .social-link {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden; 
            padding: 10px; 
        }

        /* Pure inline SVGs handling */
        .social-link svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .social-link:hover svg {
            fill: #00d4ff;
            filter: drop-shadow(0px 0px 4px rgba(0, 212, 255, 0.8));
        }

        /* Dedicated Showcase Container for Exophase Card */
        .card-showcase {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 20px 0 30px 0;
        }

        .showcase-card {
            display: block;
            width: 100%;
            max-width: 420px; 
            transition: all 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .showcase-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .showcase-card:hover {
            transform: scale(1.03);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.25);
        }

        /* Music Player */
        .music-player {
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-player label {
            display: block;
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .music-player audio {
            width: 100%;
            margin-top: 10px;
            accent-color: #00d4ff;
        }

        /* Responsive adjustments for mobile viewports */
        @media (max-width: 600px) {
            .profile {
                padding: 25px 15px;
            }

            .profile h1 {
                font-size: 2.2em;
            }

            .social-links {
                gap: 8px;
                max-width: 280px; /* Lock-tight bounds for 6 per row down to small mobile views */
            }

            .social-link {
                width: 40px;
                height: 40px;
                padding: 9px;
            }

            .showcase-card {
                max-width: 100%;
            }
        }
    </style>
</head>

                svg.appendChild(path);
