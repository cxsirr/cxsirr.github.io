<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cxsir</title>
<style>
/* ============================================================
   CONFIG — edit everything here. Colors/sizes are applied via
   JS at load time (see CONFIG object in the <script> below),
   so most visual tweaks only need changes in ONE place: the
   CONFIG object near the top of the script.
   ============================================================ */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
html {
scroll-behavior: smooth;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: #0f0f0f;
color: #e0e0e0;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}
/* Background Image - blur amount is set inline from CONFIG.bgBlur via JS */
.bg-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
transform: scale(1.1); /* avoids blurred edges showing at the viewport border */
z-index: -2;
}
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.15);
z-index: -1;
pointer-events: none;
}
/* Content Container */
.container {
display: flex;
flex-direction: column;
align-items: center;
padding: 20px;
z-index: 1;
position: relative;
min-height: 100vh;
justify-content: center;
gap: 18px;
}
/* Profile Card — border-color/width/radius set inline from CONFIG.card* via JS */
.profile {
text-align: center;
width: 100%;
max-width: 420px;
backdrop-filter: blur(5px);
background: rgba(20, 40, 80, 0.25);
padding: 36px 28px 28px;
border-radius: 24px;
border: 1px solid rgba(20, 40, 80, 0.12);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
animation: fadeIn 0.6s ease-in;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
/* Profile Picture */
.pfp-wrap {
display: flex;
justify-content: center;
margin-bottom: 18px;
}
.pfp {
width: 110px;
height: 110px;
border-radius: 50%;
object-fit: cover;
border: 3px solid rgba(20, 40, 80, 0.25);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}
.profile h1 {
font-size: 2em;
margin-bottom: 8px;
letter-spacing: 0.5px;
}
.profile .tagline {
font-size: 1.05em;
color: #cfcfcf;
margin-bottom: 22px;
line-height: 1.5;
}
/* Clean grid layout for social icons — border-color/width set inline from CONFIG.icon* via JS */
.social-links {
display: flex;
justify-content: center;
gap: 12px;
flex-wrap: wrap;
margin: 22px auto 4px auto;
max-width: 340px;
}
.social-link {
width: 44px;
height: 44px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(20, 40, 80, 0.08);
border: 2px solid rgba(20, 40, 80, 0.15);
border-radius: 50%;
transition: all 0.25s ease;
text-decoration: none;
overflow: hidden;
color: #ffffff;
}
/* Inline SVG icon styling - currentColor works since SVG markup lives in the DOM */
.social-link svg {
width: 22px;
height: 22px;
fill: currentColor;
color: inherit;
transition: all 0.25s ease;
display: block;
}
.social-link:hover {
background: rgba(20, 40, 80, 0.18);
border-color: rgba(20, 40, 80, 0.5);
transform: translateY(-4px);
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
}
.social-link:active {
transform: translateY(-2px) scale(0.97);
}
/* Center-aligned Showcase Container for Exophase Card — border-color/width/radius
   set inline from CONFIG.showcase* via JS */
.card-showcase {
display: flex;
justify-content: center;
align-items: center;
width: 100%;
margin: 18px 0 4px 0;
}
.showcase-card {
display: block;
width: 100%;
max-width: 360px;
transition: all 0.3s ease;
border-radius: 12px;
overflow: hidden;
border: 1px solid rgba(20, 40, 80, 0.12);
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
}
.showcase-card img {
width: 100%;
height: auto;
display: block;
object-fit: contain;
}
.showcase-card:hover {
transform: scale(1.03);
border-color: rgba(20, 40, 80, 0.3);
box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
}
/* Custom Music Player — border-color/width/radius set inline from CONFIG.player* via JS */
.music-player {
margin-top: 22px;
padding: 10px;
display: flex;
flex-direction: column;
gap: 10px;
background: rgba(20, 40, 80, 0.55);
border: 1px solid rgba(20, 40, 80, 0.1);
border-radius: 14px;
position: relative;
transition: background 0.6s ease, border-color 0.6s ease;
}
.music-top-row {
display: flex;
align-items: center;
gap: 12px;
width: 100%;
}
.music-art {
width: 46px;
height: 46px;
border-radius: 8px;
object-fit: cover;
flex-shrink: 0;
background: rgba(20, 40, 80, 0.08);
}
.music-info {
flex: 1;
min-width: 0;
display: flex;
flex-direction: column;
gap: 4px;
}
.music-title {
font-size: 0.85em;
font-weight: 600;
color: #f0f0f0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
}
.music-artist {
font-size: 0.72em;
color: #a8a8a8;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-align: left;
margin-top: -2px;
}
.music-scrub-row {
display: flex;
align-items: center;
gap: 8px;
width: 100%;
}
.music-time {
font-size: 0.7em;
color: #a0a0a0;
flex-shrink: 0;
flex-grow: 0;
width: 32px; /* fixed width (not min-width) so "0:00" and "12:34" take identical space */
}
.music-time.current { text-align: right; }
.music-time.duration { text-align: left; }
.music-scrubber {
flex: 1 1 auto;
min-width: 0; /* allows the slider to shrink below its intrinsic size instead of overflowing */
max-width: 100%;
-webkit-appearance: none;
appearance: none;
height: 4px;
border-radius: 2px;
background: rgba(40, 80, 160, 0.5);
cursor: pointer;
outline: none;
}
.music-scrubber::-webkit-slider-thumb {
-webkit-appearance: none;
width: 10px;
height: 10px;
border-radius: 50%;
background: #ffffff;
cursor: pointer;
}
.music-scrubber::-moz-range-thumb {
width: 10px;
height: 10px;
border: none;
border-radius: 50%;
background: #ffffff;
cursor: pointer;
}
.music-controls {
display: flex;
align-items: center;
gap: 2px;
flex-shrink: 0;
}
.music-btn {
width: 30px;
height: 30px;
display: flex;
align-items: center;
justify-content: center;
background: none;
border: none;
color: #e0e0e0;
cursor: pointer;
border-radius: 50%;
transition: background 0.2s ease;
}
.music-btn:hover {
background: rgba(20, 40, 80, 0.12);
}
.music-btn svg {
width: 16px;
height: 16px;
fill: currentColor;
}
.music-btn.play-pause svg {
width: 18px;
height: 18px;
}
.music-btn:disabled {
opacity: 0.3;
cursor: default;
}
.music-btn:disabled:hover {
background: none;
}
/* Small "Live from Spotify" badge shown when CONFIG.spotifyWorkerUrl is active */
.spotify-badge {
position: absolute;
top: -8px;
right: 10px;
background: rgba(20, 40, 80, 0.5);
color: #cfe0ff;
font-size: 0.6em;
font-weight: 700;
padding: 2px 7px;
border-radius: 8px;
letter-spacing: 0.3px;
border: 1px solid rgba(207, 224, 255, 0.4);
display: none;
}
/* Shown instead of the LIVE badge when Spotify mode is active but nothing
   is currently playing — i.e. displaying recently-played history. */
.recently-played-badge {
position: absolute;
top: -8px;
right: 10px;
background: rgba(20, 40, 80, 0.5);
color: #cfe0ff;
font-size: 0.6em;
font-weight: 700;
padding: 2px 7px;
border-radius: 8px;
letter-spacing: 0.3px;
border: 1px solid rgba(207, 224, 255, 0.4);
display: none;
}

/* ---- Rocket League stats section ---- */
.rl-section {
width: 100%;
max-width: 420px;
}
.rl-card {
backdrop-filter: blur(5px);
padding: 24px 22px;
animation: fadeIn 0.6s ease-in;
}
.rl-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 18px;
}
.rl-platform-icon {
width: 28px;
height: 28px;
flex-shrink: 0;
fill: #e0e0e0;
}
.rl-header h2 {
font-size: 1.3em;
font-weight: 700;
}
.rl-header .rl-username {
font-size: 0.85em;
color: #a8b8d8;
font-weight: 400;
text-align: left;
}
.rl-loading, .rl-error {
font-size: 0.85em;
color: #a8a8a8;
text-align: center;
padding: 12px 0;
}
.rl-best-mmr {
display: flex;
justify-content: space-between;
align-items: center;
background: rgba(20, 40, 80, 0.4);
border-radius: 10px;
padding: 12px 16px;
margin-bottom: 16px;
}
.rl-best-mmr .label {
font-size: 0.8em;
color: #a8b8d8;
}
.rl-best-mmr .value {
font-size: 1.3em;
font-weight: 700;
color: #ffffff;
}
.rl-playlists {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
gap: 10px;
margin-bottom: 18px;
}
.rl-playlist-card {
background: rgba(20, 40, 80, 0.35);
border-radius: 10px;
padding: 12px 10px;
text-align: center;
}
.rl-playlist-name {
font-size: 0.7em;
color: #a8b8d8;
text-transform: uppercase;
letter-spacing: 0.5px;
margin-bottom: 6px;
}
.rl-playlist-rank-img {
width: 48px;
height: 48px;
margin: 0 auto 6px;
display: block;
object-fit: contain;
}
.rl-playlist-rank-name {
font-size: 0.78em;
font-weight: 600;
color: #f0f0f0;
}
.rl-playlist-division {
font-size: 0.85em;
font-weight: 400;
color: #8a9bc0;
}
.rl-playlist-rating {
font-size: 0.68em;
color: #8a9bc0;
margin-top: 2px;
}
.rl-overview-title {
font-size: 0.85em;
font-weight: 600;
color: #cfcfcf;
margin-bottom: 10px;
}
.rl-overview-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}
.rl-stat {
background: rgba(20, 40, 80, 0.3);
border-radius: 8px;
padding: 10px 6px;
text-align: center;
}
.rl-stat .value {
font-size: 1.1em;
font-weight: 700;
color: #ffffff;
}
.rl-stat .label {
font-size: 0.62em;
color: #8a9bc0;
text-transform: uppercase;
letter-spacing: 0.3px;
margin-top: 2px;
}
.rl-updated {
font-size: 0.65em;
color: #6f80a0;
text-align: right;
margin-top: 14px;
}

/* Responsive Mobile Layout Rules */
@media (max-width: 600px) {
.profile {
padding: 28px 18px 22px;
}
.pfp {
width: 90px;
height: 90px;
}
.profile h1 {
font-size: 1.7em;
}
.social-links {
gap: 8px;
max-width: 280px;
}
.social-link {
width: 40px;
height: 40px;
}
.social-link svg {
width: 19px;
height: 19px;
}
.rl-overview-grid {
grid-template-columns: repeat(2, 1fr);
}
}
</style>
</head>
<body>
<div class="bg-container" id="bgContainer"></div>
<div class="container">
<div class="profile" id="profileCard">
<div class="pfp-wrap">
<img class="pfp" id="profilePfp" src="" alt="Profile picture">
</div>
<h1 id="profileName"></h1>
<p class="tagline" id="profileBio"></p>

<div class="social-links" id="socialLinks"></div>

<div class="music-player" id="musicPlayer">
<div class="spotify-badge" id="spotifyBadge">LIVE</div>
<div class="recently-played-badge" id="recentlyPlayedBadge">RECENTLY PLAYED</div>
<div class="music-top-row">
<img class="music-art" id="musicArt" src="" alt="" crossorigin="anonymous">
<div class="music-info">
<div class="music-title" id="musicTitle">No track loaded</div>
<div class="music-artist" id="musicArtist"></div>
</div>
<div class="music-controls" id="musicControls">
<button class="music-btn" id="musicPrev" title="Previous track">
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
</button>
<button class="music-btn play-pause" id="musicPlayPause" title="Play/Pause">
<svg id="playIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
<svg id="pauseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
</button>
<button class="music-btn" id="musicNext" title="Next track">
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
</button>
</div>
</div>
<div class="music-scrub-row" id="musicScrubRow">
<span class="music-time current" id="musicCurrentTime">0:00</span>
<input type="range" class="music-scrubber" id="musicScrubber" value="0" min="0" max="100" step="0.1">
<span class="music-time duration" id="musicDuration">0:00</span>
</div>
<audio id="audioEl" preload="metadata"></audio>
<canvas id="artSampleCanvas" width="10" height="10" style="display:none"></canvas>
</div>

<div class="card-showcase" id="cardShowcase"></div>
</div>

<div class="rl-section" id="rlSection">
<div class="profile rl-card" id="rlCard">
<div class="rl-header">

function formatTime(seconds) {
if (!isFinite(seconds)) return "0:00";
const m = Math.floor(seconds / 60);
const s = Math.floor(seconds % 60).toString().padStart(2, '0');
return `${m}:${s}`;
}

window.addEventListener('DOMContentLoaded', () => {
document.getElementById('profileName').textContent = CONFIG.name;
document.getElementById('profileBio').textContent = CONFIG.bio;
document.getElementById('profilePfp').src = CONFIG.pfpUrl;

if (CONFIG.bgImage) {
const bg = document.getElementById('bgContainer');
bg.style.backgroundImage = `url('${CONFIG.bgImage}')`;
bg.style.filter = `blur(${CONFIG.bgBlur}px)`;
}

// ---- Apply CONFIG-driven border/background styling ----
const profileCard = document.getElementById('profileCard');
profileCard.style.borderColor = CONFIG.cardBorderColor;
profileCard.style.borderWidth = `${CONFIG.cardBorderWidth}px`;
profileCard.style.borderRadius = `${CONFIG.cardBorderRadius}px`;
profileCard.style.background = CONFIG.cardBackground;

// The RL card reuses the same .profile class for visual consistency, so
// apply the same CONFIG-driven border/background to it too.
const rlCard = document.getElementById('rlCard');
rlCard.style.borderColor = CONFIG.cardBorderColor;
rlCard.style.borderWidth = `${CONFIG.cardBorderWidth}px`;
rlCard.style.borderRadius = `${CONFIG.cardBorderRadius}px`;
rlCard.style.background = CONFIG.cardBackground;

const musicPlayerStatic = document.getElementById('musicPlayer');
musicPlayerStatic.style.borderColor = CONFIG.playerBorderColor;
musicPlayerStatic.style.borderWidth = `${CONFIG.playerBorderWidth}px`;
musicPlayerStatic.style.borderRadius = `${CONFIG.playerBorderRadius}px`;
musicPlayerStatic.style.background = CONFIG.playerBackground;

// Inject icon border/background as a small stylesheet, since these apply
// to every .social-link rather than one element by id.
const iconStyleTag = document.createElement('style');
iconStyleTag.textContent = `
.social-link {
border-color: ${CONFIG.iconBorderColor} !important;
border-width: ${CONFIG.iconBorderWidth}px !important;
background: ${CONFIG.iconBackground} !important;
}
`;
document.head.appendChild(iconStyleTag);

// ---- Social icons: fetch + inline each SVG so currentColor (white) applies ----
const linksContainer = document.getElementById('socialLinks');
CONFIG.links.forEach(async (link) => {
const a = document.createElement('a');
a.href = link.url;
a.className = 'social-link';
a.title = link.name;
a.target = '_blank';

if (link.icon) {
try {
const res = await fetch(`assets/logos/${link.icon}.svg`);
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const svgText = await res.text();
a.insertAdjacentHTML('beforeend', svgText);

const svgEl = a.querySelector('svg');
const titleEl = svgEl && svgEl.querySelector('title');
if (titleEl) titleEl.remove();
} catch (err) {
console.error(`Failed to load icon "${link.icon}":`, err);
}
}

linksContainer.appendChild(a);
});

if (CONFIG.exophaseCardUrl) {
const showcaseContainer = document.getElementById('cardShowcase');
const aCard = document.createElement('a');
aCard.href = "https://www.exophase.com/user/cxsir/";
aCard.className = 'showcase-card';
aCard.target = '_blank';
aCard.title = "Exophase Card";
aCard.style.borderColor = CONFIG.showcaseBorderColor;
aCard.style.borderWidth = `${CONFIG.showcaseBorderWidth}px`;

const imgCard = document.createElement('img');
imgCard.src = CONFIG.exophaseCardUrl;
imgCard.alt = "Exophase Achievement Card";
aCard.appendChild(imgCard);

showcaseContainer.appendChild(aCard);
}

// ---- Custom music player ----
const audio = document.getElementById('audioEl');
const playPauseBtn = document.getElementById('musicPlayPause');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const prevBtn = document.getElementById('musicPrev');
const nextBtn = document.getElementById('musicNext');
const scrubber = document.getElementById('musicScrubber');
const currentTimeEl = document.getElementById('musicCurrentTime');
const durationEl = document.getElementById('musicDuration');
const scrubRow = document.getElementById('musicScrubRow');
const titleEl = document.getElementById('musicTitle');
const artistEl = document.getElementById('musicArtist');
const artEl = document.getElementById('musicArt');
const spotifyBadge = document.getElementById('spotifyBadge');
const recentlyPlayedBadge = document.getElementById('recentlyPlayedBadge');
const musicControlsEl = document.getElementById('musicControls');
const musicPlayerEl = document.querySelector('.music-player');
const sampleCanvas = document.getElementById('artSampleCanvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

function tintPlayerFromArt(imgEl) {
if (!CONFIG.playerColorFromArt || !imgEl || !imgEl.src) {
resetPlayerTint();
return;
}

const apply = () => {
try {
sampleCtx.drawImage(imgEl, 0, 0, 10, 10);
const { data } = sampleCtx.getImageData(0, 0, 10, 10);
let r = 0, g = 0, b = 0, count = 0;
for (let i = 0; i < data.length; i += 4) {
r += data[i];
g += data[i + 1];
b += data[i + 2];
count++;
}
r = Math.round(r / count);
g = Math.round(g / count);
b = Math.round(b / count);

musicPlayerEl.style.background = `linear-gradient(135deg, rgba(${r}, ${g}, ${b}, 0.35), ${CONFIG.playerBackground})`;
musicPlayerEl.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.4)`;
} catch (err) {
console.warn('Album art color sampling failed:', err);
resetPlayerTint();
}
};

if (imgEl.complete && imgEl.naturalWidth > 0) {
apply();
} else {
imgEl.onload = apply;
imgEl.onerror = resetPlayerTint;
}
}

function resetPlayerTint() {
musicPlayerEl.style.background = CONFIG.playerBackground;
musicPlayerEl.style.borderColor = CONFIG.playerBorderColor;
}

let trackIndex = 0;
let isScrubbing = false;
let spotifyMode = false;
let lastSpotifyUrl = null;
let spotifyProgressMs = 0;
let spotifyDurationMs = 0;
let spotifyTickHandle = null;

function loadTrack(index, autoplay) {
if (!CONFIG.tracks.length) return;
trackIndex = (index + CONFIG.tracks.length) % CONFIG.tracks.length;
const track = CONFIG.tracks[trackIndex];
renderTrack(track, autoplay);
}

function renderTrack(track, autoplay) {
audio.src = track.url;
titleEl.textContent = track.title || "Untitled";
artistEl.textContent = track.artist || "";
artistEl.style.display = track.artist ? 'block' : 'none';
artEl.src = track.art || "";
artEl.style.visibility = track.art ? 'visible' : 'hidden';
tintPlayerFromArt(track.art ? artEl : null);
scrubRow.style.display = 'flex';
if (autoplay) audio.play().catch(() => {});
}

function setPlayingIcon(playing) {
playIcon.style.display = playing ? 'none' : 'block';
pauseIcon.style.display = playing ? 'block' : 'none';
}

function setSpotifyMode(active) {
spotifyMode = active;
prevBtn.disabled = active;
nextBtn.disabled = active;
playPauseBtn.disabled = active;
scrubber.disabled = active;
// Controls are only ever shown in manual/local track mode — Spotify mode
// is a status display, not playable here, so prev/play/next never apply.
musicControlsEl.style.display = active ? 'none' : 'flex';
if (!active) {
spotifyBadge.style.display = 'none';
recentlyPlayedBadge.style.display = 'none';
}
}

function startSpotifyTicking() {
stopSpotifyTicking();
spotifyTickHandle = setInterval(() => {
if (!spotifyMode) return;
spotifyProgressMs = Math.min(spotifyProgressMs + 1000, spotifyDurationMs || spotifyProgressMs + 1000);
updateSpotifyProgressUI();
}, 1000);
}

function stopSpotifyTicking() {
if (spotifyTickHandle) {
clearInterval(spotifyTickHandle);
spotifyTickHandle = null;
}
}

function updateSpotifyProgressUI() {
const progressSec = spotifyProgressMs / 1000;
const durationSec = spotifyDurationMs / 1000;
scrubber.max = durationSec || 0;
scrubber.value = progressSec;
currentTimeEl.textContent = formatTime(progressSec);
durationEl.textContent = formatTime(durationSec);
}

async function fetchNowPlaying() {
if (!CONFIG.spotifyWorkerUrl) return;

try {
const res = await fetch(CONFIG.spotifyWorkerUrl, { cache: 'no-store' });
if (!res.ok) throw new Error(`Worker returned ${res.status}`);
const data = await res.json();

if (!data || !data.title) {
if (spotifyMode) {
setSpotifyMode(false);
stopSpotifyTicking();
loadTrack(0, false);
}
return;
}

const isNewTrack = data.url !== lastSpotifyUrl;
lastSpotifyUrl = data.url;

spotifyProgressMs = typeof data.progressMs === "number" ? data.progressMs : 0;
spotifyDurationMs = typeof data.durationMs === "number" ? data.durationMs : 0;

setSpotifyMode(true);
spotifyBadge.style.display = data.isPlaying ? 'block' : 'none';
recentlyPlayedBadge.style.display = data.isPlaying ? 'none' : 'block';
scrubRow.style.display = data.isPlaying ? 'flex' : 'none';

if (isNewTrack) {
renderTrack({
title: data.title,
artist: data.artist || "",
art: data.art || "",
url: ""
}, false);

audio.pause();
audio.removeAttribute('src');
setPlayingIcon(data.isPlaying);
scrubRow.style.display = data.isPlaying ? 'flex' : 'none';

titleEl.title = data.url ? "Open in Spotify" : "";
if (data.url) {
titleEl.style.cursor = 'pointer';
titleEl.onclick = () => window.open(data.url, '_blank');
}
} else {
setPlayingIcon(data.isPlaying);
}

updateSpotifyProgressUI();

if (data.isPlaying) {
startSpotifyTicking();
} else {
stopSpotifyTicking();
}
} catch (err) {
console.error('Spotify fetch failed:', err);
}
}

if (CONFIG.spotifyWorkerUrl) {
fetchNowPlaying();
setInterval(fetchNowPlaying, Math.max(5, CONFIG.spotifyPollSeconds) * 1000);
} else if (CONFIG.tracks.length) {
loadTrack(0, false);
}

playPauseBtn.addEventListener('click', () => {
if (spotifyMode) return;
if (audio.paused) {
audio.play().catch(() => {});
} else {
audio.pause();
}
});

prevBtn.addEventListener('click', () => {
if (spotifyMode) return;
loadTrack(trackIndex - 1, true);
});
nextBtn.addEventListener('click', () => {
if (spotifyMode) return;
loadTrack(trackIndex + 1, true);
});

audio.addEventListener('play', () => setPlayingIcon(true));
audio.addEventListener('pause', () => setPlayingIcon(false));
audio.addEventListener('ended', () => {
if (!spotifyMode) loadTrack(trackIndex + 1, true);
});

audio.addEventListener('loadedmetadata', () => {
scrubber.max = audio.duration || 0;
durationEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('timeupdate', () => {
if (isScrubbing) return;
scrubber.value = audio.currentTime;
currentTimeEl.textContent = formatTime(audio.currentTime);
});

scrubber.addEventListener('input', () => {
if (spotifyMode) return;
isScrubbing = true;
currentTimeEl.textContent = formatTime(parseFloat(scrubber.value));
});

scrubber.addEventListener('change', () => {
if (spotifyMode) return;
audio.currentTime = parseFloat(scrubber.value);
isScrubbing = false;
});

// ---- Rocket League stats ----
document.getElementById('rlUsername').textContent = CONFIG.rocketLeagueUsername;

function formatNumber(n) {
if (typeof n !== 'number') return n;
return n.toLocaleString();
}

// Pulls a numeric stat value out of Tracker Network's typical
// segment.stats.<key>.value shape, trying a couple of likely key spellings
// since exact field names can vary slightly by endpoint version.
function getStatValue(statsObj, keys) {
if (!statsObj) return null;
for (const key of keys) {
const stat = statsObj[key];
if (stat && typeof stat.value === 'number') return stat.value;
if (typeof stat === 'number') return stat;
}
return null;
}

function renderRocketLeagueStats(profile) {
const content = document.getElementById('rlContent');
content.innerHTML = '';

if (!profile) {
content.innerHTML = '<div class="rl-error">No stats available yet.</div>';
return;
}

const segments = profile.segments || [];
const overviewSegment = segments.find((s) => s.type === 'overview') || null;

// Only show these specific playlists, in this order, per the requested scope.
const WANTED_PLAYLISTS = [
'Ranked Duel 1v1',
'Ranked Doubles 2v2',
'Rumble',
'Tournament Matches',
'Heatseeker',
'Casual',
];
const playlistSegments = WANTED_PLAYLISTS
.map((wantedName) => segments.find((s) => s.type === 'playlist' && s.metadata?.name === wantedName))
.filter(Boolean);

// ---- Best 2v2 MMR ----
if (typeof profile.best_2v2_mmr === 'number') {
const mmrRow = document.createElement('div');
mmrRow.className = 'rl-best-mmr';
mmrRow.innerHTML = `
<span class="label">Best 2v2 MMR</span>
<span class="value">${formatNumber(profile.best_2v2_mmr)}</span>
`;
content.appendChild(mmrRow);
}

// ---- Selected playlists ----
if (playlistSegments.length) {
const grid = document.createElement('div');
grid.className = 'rl-playlists';

playlistSegments.forEach((seg) => {
const name = seg.metadata?.name || 'Playlist';
const rankName = seg.stats?.tier?.metadata?.name || 'Unranked';
const rankImg = seg.stats?.tier?.metadata?.iconUrl || '';
const divisionName = seg.stats?.division?.metadata?.name || '';
const rating = getStatValue(seg.stats, ['rating']);

const card = document.createElement('div');
card.className = 'rl-playlist-card';
card.innerHTML = `
<div class="rl-playlist-name">${name}</div>
${rankImg ? `<img class="rl-playlist-rank-img" src="${rankImg}" alt="${rankName}">` : ''}
<div class="rl-playlist-rank-name">${rankName}${divisionName ? ` <span class="rl-playlist-division">${divisionName}</span>` : ''}</div>
${rating !== null ? `<div class="rl-playlist-rating">${formatNumber(rating)} MMR</div>` : ''}
`;
grid.appendChild(card);
});

content.appendChild(grid);
}

// ---- Lifetime overview stats ----
if (overviewSegment && overviewSegment.stats) {
const title = document.createElement('div');
title.className = 'rl-overview-title';
title.textContent = 'Lifetime Stats';
content.appendChild(title);

const statDefs = [
{ keys: ['wins'], label: 'Wins' },
{ keys: ['goals'], label: 'Goals' },
{ keys: ['assists'], label: 'Assists' },
{ keys: ['saves'], label: 'Saves' },
{ keys: ['shots'], label: 'Shots' },
{ keys: ['mVPs'], label: 'MVPs' },
];

const grid = document.createElement('div');
grid.className = 'rl-overview-grid';

statDefs.forEach((def) => {
const val = getStatValue(overviewSegment.stats, def.keys);
if (val === null) return;
const cell = document.createElement('div');
cell.className = 'rl-stat';
cell.innerHTML = `<div class="value">${formatNumber(val)}</div><div class="label">${def.label}</div>`;
grid.appendChild(cell);
});

if (grid.children.length) {
content.appendChild(grid);
} else if (!content.children.length) {
content.innerHTML = '<div class="rl-error">No stats available yet.</div>';
}
}

if (!content.children.length) {
content.innerHTML = '<div class="rl-error">No stats available yet.</div>';
}
}

async function fetchRocketLeagueStats() {
if (!CONFIG.rocketLeagueWorkerUrl) return;

try {
const res = await fetch(CONFIG.rocketLeagueWorkerUrl, { cache: 'no-store' });
if (!res.ok) throw new Error(`Worker returned ${res.status}`);
const data = await res.json();
const entry = data[CONFIG.rocketLeaguePlayerId];

const updatedEl = document.getElementById('rlUpdated');

if (!entry || !entry.profile) {
document.getElementById('rlContent').innerHTML =
`<div class="rl-loading">${entry?.error || 'Stats not cached yet — check back soon.'}</div>`;
updatedEl.textContent = '';
return;
}

renderRocketLeagueStats(entry.profile);
if (entry.lastUpdated) {
const d = new Date(entry.lastUpdated);
updatedEl.textContent = `Updated ${d.toLocaleDateString()} ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
}
} catch (err) {
console.error('Rocket League fetch failed:', err);
document.getElementById('rlContent').innerHTML = '<div class="rl-error">Couldn\'t load stats right now.</div>';
}
}

fetchRocketLeagueStats();
});
</script>
</body>
</html>
