<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            z-index: -2;
            
            /* ADD YOUR BACKGROUND IMAGE URL BELOW */
            background-image: url('YOUR_IMAGE_URL_HERE');
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }

        /* Content Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile p {
            font-size: 1.1em;
            color: #b0b0b0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.5em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        /* Music Player */
        .music-player {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-player label {
            display: block;
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .music-player audio {
            width: 100%;
            margin-top: 10px;
            accent-color: #00d4ff;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .profile {
                padding: 25px;
            }

            .profile h1 {
                font-size: 1.8em;
            }

            .social-link {
                width: 45px;
                height: 45px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-container" id="bgContainer"></div>

    <div class="container">
        <div class="profile">
            <h1>Your Name</h1>
            
            <p>Welcome to my profile</p>

            <div class="social-links" id="socialLinks">
                <a href="YOUR_LINK_1" class="social-link" title="Twitter" target="_blank">𝕏</a>
                <a href="YOUR_LINK_2" class="social-link" title="Instagram" target="_blank">📸</a>
                <a href="YOUR_LINK_3" class="social-link" title="YouTube" target="_blank">📺</a>
            </div>

            <div class="music-player">
                <label for="bgMusic">🎵 Background Music</label>
                <audio id="bgMusic" controls loop>
                    <source src="YOUR_MUSIC_URL_HERE" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>
</body>
</html>
