<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            z-index: -2;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }

        /* Content Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile p {
            font-size: 1.1em;
            color: #b0b0b0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Social Links Grid */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap; /* Allows endless buttons to warp onto new lines */
            margin: 30px 0;
            max-width: 100%;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden; 
            padding: 11px; 
        }

        .social-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 2px rgba(0, 212, 255, 0.5)); 
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        /* Music Player */
        .music-player {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-player label {
            display: block;
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .music-player audio {
            width: 100%;
            margin-top: 10px;
            accent-color: #00d4ff;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .profile {
                padding: 25px;
            }

            .profile h1 {
                font-size: 1.8em;
            }

            .social-link {
                width: 45px;
                height: 45px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bgContainer"></div>

    <div class="container">
        <div class="profile">
            <h1 id="profileName"></h1>
            <p id="profileBio"></p>

            <div class="social-links" id="socialLinks"></div>

            <div class="music-player">
                <label for="bgMusic">🎵 Background Music</label>
                <audio id="bgMusic" controls loop>
                    <source id="musicSource" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            name: "cxsir",
            bio: "Welcome to my profile",
            bgImage: "https://via.placeholder.com/1920x1080", 
            musicUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", 
            
            // To create MORE buttons, just copy one of these blocks, 
            // add a comma to the previous one, and paste it below.
            links: [
                {
                    name: "Discord",
                    url: "https://discord.com",
                    iconImage: "https://cdn-icons-png.flaticon.com/512/3670/3670157.png"
                },
                {
                    name: "Steam",
                    url: "https://steamcommunity.com",
                    iconImage: "https://cdn-icons-png.flaticon.com/512/220/220223.png"
                },
                {
                    name: "PlayStation",
                    url: "https://www.playstation.com",
                    iconImage: "https://cdn-icons-png.flaticon.com/512/5968/5968816.png"
                },
                {
                    name: "YouTube",
                    url: "https://youtube.com",
                    iconImage: "https://cdn-icons-png.flaticon.com/512/174/174883.png"
                }
            ]
        };

        // --- AUTOMATIC LOAD LOGIC (Safe to ignore) ---
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('profileName').textContent = CONFIG.name;
            document.getElementById('profileBio').textContent = CONFIG.bio;
            
            if (CONFIG.bgImage) {
                document.getElementById('bgContainer').style.backgroundImage = `url('${CONFIG.bgImage}')`;
            }
            
            if (CONFIG.musicUrl) {
                const audio = document.getElementById('bgMusic');
                document.getElementById('musicSource').src = CONFIG.musicUrl;
                audio.load();
            }

            const linksContainer = document.getElementById('socialLinks');
            CONFIG.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'social-link';
                a.title = link.name;
                a.target = '_blank';

                const img = document.createElement('img');
                img.src = link.iconImage;
                img.alt = link.name;

                a.appendChild(img);
                linksContainer.appendChild(a);
            });
        });
    </script>
</body>
</html>
