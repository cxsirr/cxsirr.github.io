<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            z-index: -2;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }

        /* Content Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile p {
            font-size: 1.1em;
            color: #b0b0b0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Standard Social Links (Rows Setup) */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap; 
            margin: 25px 0 15px 0;
            max-width: 100%;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden; 
            padding: 12px; 
        }

        /* Forces clean SVG rendering and colors icons white */
        .social-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0) invert(1);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .social-link:hover img {
            filter: brightness(0) invert(1) drop-shadow(0px 0px 2px rgba(0, 212, 255, 0.8));
        }

        /* Dedicated Showcase Container for Exophase Card */
        .card-showcase {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 20px 0 30px 0;
        }

        .showcase-card {
            display: block;
            width: 100%;
            max-width: 420px; /* Bigger prominent display size */
            transition: all 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .showcase-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .showcase-card:hover {
            transform: scale(1.03);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.25);
        }

        /* Music Player */
        .music-player {
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-player label {
            display: block;
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .music-player audio {
            width: 100%;
            margin-top: 10px;
            accent-color: #00d4ff;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .profile {
                padding: 25px 20px;
            }

            .profile h1 {
                font-size: 1.8em;
            }

            .social-link {
                width: 44px;
                height: 44px;
                padding: 11px;
                gap: 12px;
            }

            .showcase-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bgContainer"></div>

    <div class="container">
        <div class="profile">
            <h1 id="profileName"></h1>
            <p id="profileBio"></p>

            <!-- Standard icons grid -->
            <div class="social-links" id="socialLinks"></div>

            <!-- Centered large showcase card container -->
            <div class="card-showcase" id="cardShowcase"></div>

            <div class="music-player">
                <label for="bgMusic">🎵 Background Music</label>
                <audio id="bgMusic" controls loop>
                    <source id="musicSource" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!--          MAJOR CUSTOMIZATION BLOCK         -->
    <!-- ========================================== -->
    <script>
        const CONFIG = {
            name: "cxsir",
            bio: "Welcome to my profile",
            bgImage: "https://via.placeholder.com/1920x1080", 
            musicUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", 
            
            links: [
                {
                    name: "Snapchat",
                    url: "https://snapchat.com/add/gangangcuh",
                    iconImage: "https://simpleicons.org/icons/snapchat.svg"
                },
                {
                    name: "Instagram",
                    url: "https://instagram.com/cxsirr",
                    iconImage: "https://simpleicons.org/icons/instagram.svg"
                },
                {
                    name: "YouTube",
                    url: "https://youtube.com/@cxsirr",
                    iconImage: "https://simpleicons.org/icons/youtube.svg"
                },
                {
                    name: "Spotify",
                    url: "https://open.spotify.com/user/dandandaman1234",
                    iconImage: "https://simpleicons.org/icons/spotify.svg"
                },
                {
                    name: "Last.fm",
                    url: "https://last.fm/user/cxsir",
                    iconImage: "https://simpleicons.org/icons/lastdotfm.svg"
                },
                {
                    name: "PlayStation",
                    url: "https://profile.playstation.com/IGOTTMT",
                    iconImage: "https://simpleicons.org/icons/playstation.svg"
                },
                {
                    name: "Xbox",
                    url: "https://xbox.com/play/user/cxsirr",
                    iconImage: "https://simpleicons.org/icons/xbox.svg"
                },
                {
                    name: "Steam",
                    url: "https://steamcommunity.com/id/cxsir",
                    iconImage: "https://simpleicons.org/icons/steam.svg"
                },
                {
                    name: "Discord",
                    url: "https://discord.com/users/803306255062007818",
                    iconImage: "https://simpleicons.org/icons/discord.svg"
                },
                {
                    name: "Roblox",
                    url: "https://roblox.com/users/2242266391/profile",
                    iconImage: "https://simpleicons.org/icons/roblox.svg"
                },
                {
                    name: "GitHub",
                    url: "https://github.com/cxsirr",
                    iconImage: "https://simpleicons.org/icons/github.svg"
                },
                {
                    name: "Email",
                    url: "mailto:cxsir@proton.me",
                    iconImage: "https://simpleicons.org/icons/proton.svg"
                }
            ],

            // The Exophase banner URL goes here so it stays separate and centered below the rows
            exophaseCardUrl: "https://card.exophase.com/2/0/327032.png"
        };

        // --- AUTOMATIC LOAD LOGIC (Safe to ignore) ---
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('profileName').textContent = CONFIG.name;
            document.getElementById('profileBio').textContent = CONFIG.bio;
            
            if (CONFIG.bgImage) {
                document.getElementById('bgContainer').style.backgroundImage = `url('${CONFIG.bgImage}')`;
            }
            
            if (CONFIG.musicUrl) {
                const audio = document.getElementById('bgMusic');
                document.getElementById('musicSource').src = CONFIG.musicUrl;
                audio.load();
            }

            // Build out standard rows of social buttons
            const linksContainer = document.getElementById('socialLinks');
            CONFIG.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'social-link';
                a.title = link.name;
                a.target = '_blank';

                const img = document.createElement('img');
                img.src = link.iconImage;
                img.alt = link.name;

                a.appendChild(img);
                linksContainer.appendChild(a);
            });

            // Build out larger centered Exophase banner card block
            if (CONFIG.exophaseCardUrl) {
                const showcaseContainer = document.getElementById('cardShowcase');
                const aCard = document.createElement('a');
                aCard.href = "https://www.exophase.com"; // Links back to main platform or choice profile link
                aCard.className = 'showcase-card';
                aCard.target = '_blank';
                aCard.title = "Exophase Card";

                const imgCard = document.createElement('img');
                imgCard.src = CONFIG.exophaseCardUrl;
                imgCard.alt = "Exophase Achievement Card";

                aCard.appendChild(imgCard);
                showcaseContainer.appendChild(aCard);
            }
        });
    </script>
</body>
</html>
