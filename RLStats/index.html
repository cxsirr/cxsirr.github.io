<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket League Stats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: blur(16px);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #0088ff; /* Rocket League Blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0c10;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            top: 20%;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-card i {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .rank-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rank-info {
            text-align: left;
        }

        .rank-title {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .rank-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .loading {
            font-size: 1rem;
            color: var(--text-sub);
            padding: 40px 0;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
            font-size: 1.5rem;
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div id="loading" class="loading">
            <i class="fa-solid fa-circle-notch"></i>
            Loading tracker data...
        </div>

        <div id="content" class="hidden">
            <div class="header">
                <h1 id="username"><i class="fa-solid fa-gamepad" style="color: var(--accent); margin-right: 8px;"></i>I cxsir I</h1>
                <p>Live Rocket League Tracker</p>
            </div>

            <div class="rank-container">
                <div class="rank-info">
                    <div class="rank-title">Ranked Doubles 2v2</div>
                    <div class="rank-name" id="rank-value">Loading...</div>
                </div>
                <div class="stat-value" id="mmr-value" style="color: var(--accent);">- MMR</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-trophy"></i>
                    <div class="stat-label">Wins</div>
                    <div class="stat-value" id="stat-wins">-</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-bullseye"></i>
                    <div class="stat-label">Goals</div>
                    <div class="stat-value" id="stat-goals">-</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-shield-halved"></i>
                    <div class="stat-label">Saves</div>
                    <div class="stat-value" id="stat-saves">-</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-hands-helping"></i>
                    <div class="stat-label">Assists</div>
                    <div class="stat-value" id="stat-assists">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('https://github-io.cxsir.workers.dev/rocketleague');
                if (!response.ok) throw new Error('Failed to fetch tracking metrics');
                
                const data = await response.json();
                const segments = data.profile?.segments || [];

                // 1. Map Username Handle
                const handle = data.profile?.platformInfo?.platformUserHandle || "I cxsir I";
                document.getElementById('username').innerHTML = `<i class="fa-solid fa-gamepad" style="color: var(--accent); margin-right: 8px;"></i>${handle}`;

                // 2. Extract Lifetime Overview Data
                const overview = segments.find(s => s.type === 'overview');
                if (overview?.stats) {
                    document.getElementById('stat-wins').textContent = overview.stats.wins?.displayValue || '-';
                    document.getElementById('stat-goals').textContent = overview.stats.goals?.displayValue || '-';
                    document.getElementById('stat-saves').textContent = overview.stats.saves?.displayValue || '-';
                    document.getElementById('stat-assists').textContent = overview.stats.assists?.displayValue || '-';
                }

                // 3. Extract Competitive 2v2 Tier & MMR Placement
                const doubles2v2 = segments.find(s => s.type === 'playlist' && s.metadata?.name === 'Ranked Doubles 2v2');
                if (doubles2v2?.stats) {
                    const tierName = doubles2v2.stats.tier?.metadata?.name || 'Unranked';
                    const divisionName = doubles2v2.stats.division?.metadata?.name || '';
                    const rating = doubles2v2.stats.rating?.displayValue || '-';
                    
                    document.getElementById('rank-value').textContent = divisionName ? `${tierName} (${divisionName})` : tierName;
                    document.getElementById('mmr-value').textContent = `${rating} MMR`;
                }

                // Smoothly switch layouts
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (error) {
                console.error('Error rendering data stream:', error);
                document.getElementById('loading').innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color: #ff4a4a;"></i><br>Failed to parse player profile.`;
            }
        }

        window.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
