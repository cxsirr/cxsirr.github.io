<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket League Stats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: blur(20px);
            --card-bg: rgba(10, 12, 16, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --inner-bg: rgba(255, 255, 255, 0.03);
            --inner-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #0088ff; /* Rocket League Blue */
            --accent-glow: rgba(0, 136, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0c10 url('../assets/bg/rocketleague.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient glow backing */
        .bg-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--accent);
            filter: blur(140px);
            opacity: 0.12;
            z-index: 0;
            top: 15%;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 16px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Car Preview Frame */
        .car-display {
            width: 100%;
            height: 160px;
            margin-bottom: 24px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        }

        .car-display img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
        }

        /* Collapsible Section Layout */
        .collapsible-wrapper {
            margin-bottom: 12px;
            border: 1px solid var(--inner-border);
            border-radius: 16px;
            background: var(--inner-bg);
            overflow: hidden;
            text-align: left;
        }

        .collapsible-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: none;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .collapsible-btn:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .collapsible-btn i.chevron {
            font-size: 0.85rem;
            transition: transform 0.3s ease;
            color: var(--text-sub);
        }

        .collapsible-btn.active i.chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .collapsible-content-inner {
            padding: 0 16px 16px 16px;
        }

        /* Live Rank Layout */
        .rank-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 136, 255, 0.05);
            border: 1px solid rgba(0, 136, 255, 0.15);
            border-radius: 14px;
            padding: 14px;
            margin-top: 4px;
        }

        .rank-info-block {
            display: flex;
            flex-direction: column;
        }

        .rank-title {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rank-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Metrics Grids */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 4px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--inner-border);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .stat-card i {
            font-size: 1rem;
            color: var(--accent);
            position: absolute;
            top: 14px;
            right: 14px;
            opacity: 0.7;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .loading {
            font-size: 1rem;
            color: var(--text-sub);
            padding: 60px 0;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-bottom: 14px;
            font-size: 1.8rem;
            display: block;
            color: var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div id="loading" class="loading">
            <i class="fa-solid fa-circle-notch"></i>
            Syncing competitive records...
        </div>

        <div id="content" class="hidden">
            <!-- Profile Header -->
            <div class="header">
                <h1 id="username"><i class="fa-solid fa-gamepad" style="color: var(--accent); margin-right: 8px;"></i>I cxsir I</h1>
                <p>Live Rocket League Tracker</p>
            </div>

            <!-- Custom Garage Car Render -->
            <div class="car-display">
                <img src="../assets/car/cxsir.png" alt="Custom Car Build" onerror="this.style.display='none'">
            </div>

            <!-- SECTION 1: COMPETITIVE PLACEMENTS (Open by default) -->
            <div class="collapsible-wrapper">
                <button class="collapsible-btn active" onclick="toggleCollapsible(this)">
                    <span><i class="fa-solid fa-trophy" style="color: var(--accent); margin-right: 8px;"></i> Playlist Standings</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </button>
                <div class="collapsible-content" style="max-height: 1000px;">
                    <div class="collapsible-content-inner">
                        <div class="rank-container">
                            <div class="rank-info-block">
                                <span class="rank-title">Ranked Doubles 2v2</span>
                                <span class="rank-name" id="rank-value">Loading Tier...</span>
                            </div>
                            <div class="stat-value" id="mmr-value" style="color: var(--accent);">- MMR</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: CORE CAREER OVERVIEW -->
            <div class="collapsible-wrapper">
                <button class="collapsible-btn" onclick="toggleCollapsible(this)">
                    <span><i class="fa-solid fa-chart-simple" style="color: var(--accent); margin-right: 8px;"></i> Core Performance</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </button>
                <div class="collapsible-content">
                    <div class="collapsible-content-inner">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fa-solid fa-crown"></i>
                                <div class="stat-label">Wins</div>
                                <div class="stat-value" id="stat-wins">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-bullseye"></i>
                                <div class="stat-label">Goals</div>
                                <div class="stat-value" id="stat-goals">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-shield-halved"></i>
                                <div class="stat-label">Saves</div>
                                <div class="stat-value" id="stat-saves">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-handshake"></i>
                                <div class="stat-label">Assists</div>
                                <div class="stat-value" id="stat-assists">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 3: ADVANCED ANALYTICS -->
            <div class="collapsible-wrapper">
                <button class="collapsible-btn" onclick="toggleCollapsible(this)">
                    <span><i class="fa-solid fa-crosshairs" style="color: var(--accent); margin-right: 8px;"></i> Advanced Metrics</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </button>
                <div class="collapsible-content">
                    <div class="collapsible-content-inner">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fa-solid fa-percentage"></i>
                                <div class="stat-label">Shot Accuracy</div>
                                <div class="stat-value" id="stat-accuracy">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-star"></i>
                                <div class="stat-label">MVPs</div>
                                <div class="stat-value" id="stat-mvps">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-gamepad"></i>
                                <div class="stat-label">Matches</div>
                                <div class="stat-value" id="stat-matches">-</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa-solid fa-chart-pie"></i>
                                <div class="stat-label">Win Rate</div>
                                <div class="stat-value" id="stat-winrate">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Collapsible UI Toggler
        function toggleCollapsible(button) {
            button.classList.toggle('active');
            const content = button.nextElementSibling;
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('https://github-io.cxsir.workers.dev/rocketleague');
                if (!response.ok) throw new Error('Network thread evaluation failure');
                
                const data = await response.json();
                const segments = data.profile?.segments || [];

                // 1. Dynamic Platform ID Mapping
                const handle = data.profile?.platformInfo?.platformUserHandle || "I cxsir I";
                document.getElementById('username').innerHTML = `<i class="fa-solid fa-gamepad" style="color: var(--accent); margin-right: 8px;"></i>${handle}`;

                // 2. Parse Lifetime Stats & Advanced Arrays
                const overview = segments.find(s => s.type === 'overview');
                if (overview?.stats) {
                    const stats = overview.stats;
                    
                    // Core Stats
                    document.getElementById('stat-wins').textContent = stats.wins?.displayValue || '-';
                    document.getElementById('stat-goals').textContent = stats.goals?.displayValue || '-';
                    document.getElementById('stat-saves').textContent = stats.saves?.displayValue || '-';
                    document.getElementById('stat-assists').textContent = stats.assists?.displayValue || '-';
                    
                    // Advanced Metrics
                    document.getElementById('stat-accuracy').textContent = stats.shotsPercent?.displayValue ? `${stats.shotsPercent.displayValue}%` : '-';
                    document.getElementById('stat-mvps').textContent = stats.mvps?.displayValue || '-';
                    document.getElementById('stat-matches').textContent = stats.matchesPlayed?.displayValue || '-';
                    document.getElementById('stat-winrate').textContent = stats.winPercentage?.displayValue ? `${stats.winPercentage.displayValue}%` : '-';
                }

                // 3. Extract Active 2v2 Division Placement
                const doubles2v2 = segments.find(s => s.type === 'playlist' && s.metadata?.name === 'Ranked Doubles 2v2');
                if (doubles2v2?.stats) {
                    const tierName = doubles2v2.stats.tier?.metadata?.name || 'Unranked';
                    const divisionName = doubles2v2.stats.division?.metadata?.name || '';
                    const rating = doubles2v2.stats.rating?.displayValue || '-';
                    
                    document.getElementById('rank-value').textContent = divisionName ? `${tierName} (${divisionName})` : tierName;
                    document.getElementById('mmr-value').textContent = `${rating} MMR`;
                }

                // Swap loading skeleton layout for dynamic view
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (error) {
                console.error('Error rendering live tracking telemetry:', error);
                document.getElementById('loading').innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color: #ff4a4a;"></i><br>Failed to sync live data feed.`;
            }
        }

        window.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
